<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milling Pro+</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --card-bg: #ffffff;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --error: #ef4444;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.6; padding-bottom: 60px; /* 푸터 공간 확보 */ }
    header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    .topbar { min-height: 70px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; padding: 10px 0; gap: 10px; }
    .brand h1 { font-size: 1.3rem; margin: 0; font-weight: 800; color: var(--primary); }
    
    .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    select { padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border); background: #fff; cursor: pointer; }
    button { border: none; border-radius: 12px; padding: 10px 24px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    button.primary { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
    button.primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    button.secondary { background: #f1f5f9; color: #475569; border: 1px solid var(--border); }
    button.danger { background: #fee2e2; color: var(--error); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    main .grid { display: grid; grid-template-columns: 1fr 400px; gap: 24px; padding: 30px 0; }
    @media (max-width: 1000px) { 
      main .grid { grid-template-columns: 1fr; padding: 15px 0; } 
      .topbar { flex-direction: column; align-items: flex-start; }
      .controls { width: 100%; justify-content: flex-start; }
      select { flex: 1; }
    }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow); overflow: hidden; }
    .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fcfdfe; }
    .card-body { padding: 24px; }

    .q-meta { color: var(--primary); font-size: 0.85rem; font-weight: 700; margin-bottom: 12px; }
    .question { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; color: #0f172a; white-space: pre-wrap; }
    
    .q-image-container { 
      width: fit-content; max-width: 100%; margin: 0 auto 24px auto; 
      overflow: hidden; border-radius: 12px; border: 1px solid var(--border);
      display: flex; justify-content: center; background: #f1f5f9;
    }
    .q-image-container img { max-width: 280px; width: 100%; height: auto; display: block; }

    .options { display: grid; gap: 12px; }
    .opt { background: #f8fafc; border: 1px solid var(--border); padding: 18px; border-radius: 14px; text-align: left; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
    .opt:hover:not(:disabled) { border-color: var(--primary); background: #f1f5f9; }
    .opt-idx { width: 32px; height: 32px; border-radius: 10px; background: #fff; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--text-muted); flex-shrink: 0; }

    .result-box { margin-top: 24px; padding: 24px; border-radius: 16px; animation: slideUp 0.3s ease-out; }
    .result-box.correct { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; }
    .result-box.wrong { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

    .nav-buttons { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-top: 30px; }

    .history-list { max-height: 650px; overflow-y: auto; padding-right: 8px; margin-top: 20px; }
    .history-item { padding: 20px; border-radius: 16px; background: #fff; margin-bottom: 16px; border: 1px solid var(--border); border-left: 6px solid var(--border); }
    .history-item.ok { border-left-color: var(--success); }
    .history-item.bad { border-left-color: var(--error); }
    .h-q { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; color: #334155; line-height: 1.5; }
    .h-res { font-size: 0.85rem; margin-bottom: 6px; padding: 8px 12px; border-radius: 8px; display: flex; gap: 8px; }
    .h-res.picked { background: #f1f5f9; }
    .h-label { font-weight: 800; min-width: 40px; color: var(--text-muted); }
    .hidden { display: none !important; }

    /* [추가] 좌측 하단 푸터 스타일 */
    footer {
      position: fixed;
      left: 20px;
      bottom: 15px;
      z-index: 999;
    }
    .footer-text {
      margin: 0;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      opacity: 0.6;
      font-family: monospace; /* 버전 정보라 고정폭 글꼴이 잘 어울립니다 */
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <div class="wrap"><div class="topbar">
    <div class="brand"><h1>Milling Pro+</h1></div>
    <div class="controls">
      <select id="partSelect"></select>
      <button class="primary" id="btnStart">학습 시작</button>
      <button class="danger hidden" id="btnReset">초기화</button>
    </div>
  </div></div>
</header>

<main class="wrap"><div class="grid">
  <section class="card">
    <div class="card-header">
      <div id="sectionTitle" style="font-weight: 700; color: var(--text-muted);">파트를 선택해 주세요</div>
      <div id="progressText" style="font-weight: 800; color: var(--primary);">-- / --</div>
    </div>
    <div class="card-body">
      <div id="qMeta" class="q-meta"></div>
      <div id="questionText" class="question">학습 시작 버튼을 누르면 문제가 랜덤으로 섞입니다.</div>
      
      <div id="imageWrapper" class="q-image-container hidden">
        <img id="questionImage" src="" alt="문제 이미지">
      </div>

      <div id="options" class="options"></div>

      <div id="resultBox" class="result-box hidden">
        <div id="resultBadge" style="font-weight: 900; font-size: 1.1rem; margin-bottom: 6px;"></div>
        <div id="answerText" style="font-weight: 700; margin-bottom: 10px;"></div>
        <div id="explainText" style="font-size: 0.95rem; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 12px;"></div>
      </div>

      <div class="nav-buttons">
        <button id="btnPrev" class="secondary" disabled>이전 문제</button>
        <button id="btnNext" class="primary" disabled>다음 문제</button>
      </div>
    </div>
  </section>

  <aside>
    <div class="card">
      <div class="card-header"><span style="font-weight: 800;">실시간 리포트</span></div>
      <div class="card-body">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <div style="text-align:center;"><div style="font-size:0.8rem; color:var(--text-muted);">정답률</div><div id="statRate" style="font-size:1.5rem; font-weight:800; color:var(--primary);">0%</div></div>
          <div style="text-align:center;"><div style="font-size:0.8rem; color:var(--text-muted);">정답</div><div id="statCorrect" style="font-size:1.5rem; font-weight:800; color:var(--success);">0</div></div>
          <div style="text-align:center;"><div style="font-size:0.8rem; color:var(--text-muted);">전체</div><div id="statSolved" style="font-size:1.5rem; font-weight:800;">0</div></div>
        </div>
        <div style="font-weight: 800; font-size: 0.9rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 8px;">최근 풀이 이력</div>
        <div id="resultList" class="history-list"></div>
      </div>
    </div>
  </aside>
</div></main>

<footer>
  <p class="footer-text">prcph v.2.1.7.</p>
</footer>

<script>
  // -----------------------------
  // Data
  // -----------------------------
  const quizData = [
    { part:"기계재료 및 요소", id:"2024-1회 01번", q:"다음 중 탄소 공구강 및 일반 공구재료의 구비조건이 아닌 것은?", options:["열처리성이 양호할 것","내마모성이 클 것","고온 경도가 클 것","부식성이 클 것"], answer:4, explain:"일반 공구재료는 절삭유를 사용하기 때문에 부식성이 적어야 한다(내식성 클 것)."},
    { part:"기계재료 및 요소", id:"2024-1회 02번", q:"스테인리스강을 조직상으로 분류한 것 중 틀린 것은?", options:["마텐자이트계","오스테나이트계","시멘타이트계","페라이트계"], answer:3, explain:"스테인리스강의 종류에는 페라이트계, 오스테나이트계, 마텐자이트계가 있다."},
    { part:"기계재료 및 요소", id:"2024-1회 03번", q:"베어링 합금의 구비조건으로 옳지 않은 것은?", options:["녹아 붙지 않아야 한다.","열전도율이 커야 한다.","내식성이 있고, 충분한 인성이 있어야 한다.","마찰계수가 크고, 저항력이 작아야 한다."], answer:4, explain:"베어링 합금은 하중에 견딜 수 있는 경도와 인성, 내압력을 가져야 하며 마찰계수가 작아야 한다."},
    { part:"기계재료 및 요소", id:"2024-1회 04번", q:"알루미늄(Al)에 특성에 관한 설명으로 틀린 것은?", options:["내식성이 우수하다.","합금이 어려운 재료의 특성이 있다.","압접이나 단점이 비교적 용이하다.","전연성이 우수하고 복잡한 형상의 제품을 만들기 쉽다."], answer:2, explain:"알루미늄은 다른 금속과 잘 합금되어 상온 및 고온가공이 쉽다."},
    { part:"기계재료 및 요소", id:"2024-1회 05번", q:"주철의 특성에 대한 설명으로 옳지 않은 것은?", options:["주조성이 우수하다.","내마모성이 우수하다.","강보다 탄소 함유량이 적다.","인장강도보다 압축강도가 크다."], answer:3, explain:"주철은 강보다 탄소 함유량이 많다(강: 탄소량 2.11% 이하, 주철: 탄소량 2.11~6.67%)."},
    { part:"기계재료 및 요소", id:"2024-1회 07번", q:"철강을 열처리하는 목적에 해당하지 않는 것은?", options:["일반적으로 조직을 미세화시킨다.","내부 응력을 증가시킨다.","표면을 경화시킨다.","기계적 성질을 향상시킨다."], answer:2, explain:"열처리는 내부 응력을 제거하거나 재질을 연하게 하고 기계적 성질을 향상시키는 것이 목적이다."},
    { part:"기계재료 및 요소", id:"2024-1회 08번", q:"다음 중 열가소성 수지가 아닌 것은?", options:["멜라민 수지","폴리에틸렌 수지","초산비닐 수지","폴리염화비닐 수지"], answer:1, explain:"멜라민 수지는 페놀, 에폭시 수지 등과 함께 열경화성 수지에 속한다."},

    { part:"기계제도", id:"2024-1회 06번", q:"30° 사다리꼴나사의 종류를 표시하는 기호는?", options:["Rc","Rp","TW","Tr"], answer:4, explain:"Tr은 미터 사다리꼴나사를 나타내며, 각도는 30°이다."},
    { part:"기계제도", id:"2024-1회 16번", q:"도면에서 두 종류 이상의 선이 같은 장소에 겹치게 될 경우 우선순위로 옳은 것은?", options:["외형선, 숨은선, 절단선, 중심선, 무게중심선","외형선, 중심선, 절단선, 숨은선, 무게중심선","외형선, 중심선, 숨은선, 무게중심선, 절단선","외형선, 절단선, 숨은선, 무게중심선, 중심선"], answer:1, explain:"선의 우선순위는 외형선(굵은 실선) → 숨은선(파선) → 절단선 → 중심선 → 무게중심선 순이다."},
    { part:"기계제도", id:"2024-1회 17번", q:"KS 기하공차 기호 중 원통도 표시기호는?", options:["진직도","위치도","원통도","지름"], answer:3, explain:"원통도 표시기호."},
    { part:"기계제도", id:"2024-1회 18번", q:"기계제도 도면에서 치수가 Ø 50H7/p6라 표시되어 있을 때의 설명으로 옳은 것은?", options:["구멍기준식 헐거운 끼워맞춤","축기준식 중간 끼워맞춤","구멍기준식 억지 끼워맞춤","축기준식 억지 끼워맞춤"], answer:3, explain:"H7은 구멍의 공차 클래스(구멍기준), p6는 축의 공차 클래스로 억지 끼워맞춤에 해당한다."},
    { part:"기계제도", id:"2024-1회 21번", q:"다음 그림과 같은 도면에서 ( ) 안에 들어갈 치수는?", options:["74","70","62","60"], answer:1, explain:"86 - 24 + 12 = 74",image:"24121.png"},
    { part:"기계제도", id:"2024-1회 22번", q:"치수에 사용되는 치수 보조기호의 설명으로 틀린 것은?", options:["SØ : 원의 지름","R : 반지름","□ : 정사각형의 변","C : 45° 모따기"], answer:1, explain:"SØ는 구의 지름을 의미한다. 원의 지름은 Ø이다."},
    { part:"기계제도", id:"2024-1회 23번", q:"다음 도시된 단면도의 명칭은?", options:["전단면도","한쪽단면도","부분단면도","회전도시단면도"], answer:4, explain:"핸들, 바퀴의 암, 리브 등을 그 자리에 90도 회전시켜 나타낸 단면도이다.",image:"24123.png"},
    { part:"기계제도", id:"2024-1회 24번", q:"기계제도 도면에서 파단선에 관한 설명으로 가장 옳은 것은?", options:["되풀이하는 것을 나타내는 선","전단면도를 그릴 경우 그 절단 위치를 나타내는 선","물체의 보이지 않은 부분을 가정해서 나타내는 선","물체의 일부를 떼어낸 경계를 표시하는 선"], answer:4, explain:"파단선은 물체의 일부를 떼어낸 경계를 표시한다."},
    { part:"기계제도", id:"2024-1회 25번", q:"다음 보기의 설명을 만족하기 위하여 그림의 빈칸에 들어갈 내용으로 옳은 것은?", options:["0.08 | A-B | =","⊥ | 0.08 | A-B","≡ | 0.08 | A-B","= | A-B | 0.08"], answer:3, explain:"보기의 내용은 대칭도(≡)에 대한 설명이다.",image:"24125.png"},
    { part:"기계공작법", id:"2024-1회 28번", q:"다음 중 각도 측정용 게이지가 아닌 것은?", options:["옵티컬 플랫","사인바","콤비네이션 세트","오토 콜리메이터"], answer:1, explain:"옵티컬 플랫은 평면도 측정 및 검사에 사용된다."},
    { part:"기계공작법", id:"2024-1회 31번", q:"절삭가공할 때 절삭온도를 측정하는 방법이 아닌 것은?", options:["손으로 측정한다.","열전대로 측정한다.","칩의 색깔로 측정한다.","칼로리미터로 측정한다."], answer:1, explain:"절삭온도 측정법에는 칩의 색깔, 칼리미터, 열전대 등이 있다."},
    { part:"기계공작법", id:"2024-1회 33번", q:"측정량이 증가 또는 감소하는 방향이 달라서 생기는 동일 치수에 대한 지시량의 차는?", options:["개인오차","우연오차","후퇴오차","접촉오차"], answer:3, explain:"동일한 측정량에 대하여 지침의 측정량이 증가하는 상태와 반대로 감소하는 상태에서의 읽음값의 차이다."},

    { part:"기계공작법", id:"2024-1회 26번", q:"밀링머신의 부속품과 부속장치 중 원주를 분할하는 데 사용하는 것은?", options:["슬로팅 장치","분할대","수직축 장치","랙 절삭장치"], answer:2, explain:"분할대는 테이블에 고정하여 일감을 등분할 또는 필요한 각도로 분할할 때 사용한다."},
    { part:"기계공작법", id:"2024-1회 29번", q:"수평 밀링머신의 플레인 커터작업에서 하향절삭의 장점이 아닌 것은?", options:["공작물의 고정이 쉽다.","날의 마모가 적고, 수명이 길다.","날 자리의 간격이 짧고, 가공면이 깨끗하다.","백래시 제거장치가 필요 없다."], answer:4, explain:"하향절삭은 백래시를 제거해야 하므로 백래시 제거장치가 반드시 필요하다."},
    { part:"기계공작법", id:"2024-1회 30번", q:"밀링커터를 매분 220rpm으로 회전시켜 절삭속도 110m/min으로 공작물을 절삭하려 할 때 밀링커터의 직경은 약 몇 mm인가?", options:["150","160","170","180"], answer:2, explain:"D= π×N / (1,000×V) = π×220 / (1,000×110) ≈159.2mm."},
    { part:"기계공작법", id:"2024-1회 38번", q:"슬로팅 절삭장치를 설치하기 가장 적당한 곳은?", options:["니형 밀링머신의 테이블","니형 밀링머신의 새들","니형 밀링머신의 주축","니형 밀링머신의 칼럼면"], answer:3, explain:"슬로팅 장치는 주축과 연결하여 회전운동을 직선 왕복운동으로 변화시켜 가공한다."},
    { part:"기계공작법", id:"2024-1회 42번", q:"다음 중 윤활제의 사용목적이 아닌 것은?", options:["냉각작용","마모작용","방청작용","청정작용"], answer:2, explain:"윤활제의 목적은 윤활, 냉각, 밀폐, 청정, 방청작용이다."},

    { part:"CNC 밀링", id:"2024-1회 43번", q:"다음 표는 머시닝센터의 공구를 나타낸 것이다. CNC 프로그램에서 H02 보정값으로 알맞은 것은? (기준공구 T01=90, T02=60)", options:["-30mm","20mm","30mm","50mm"], answer:1, explain:"G43이 (+)보정이므로, 60 - 90 = -30mm이다."},
    { part:"CNC 밀링", id:"2024-1회 45번", q:"머시닝센터의 고정 사이클 지령방법 ‘G_ X_ Y_ Z_ R_ Q_ P_ F_ L_’에서 ‘K 또는 L’의 의미는?", options:["고정 사이클 반복 횟수 지정","절삭 이송속도 지정","구멍 바닥에서 드웰시간 지정","초기점의 위치 지정"], answer:1, explain:"K 또는 L은 반복 횟수를 의미한다."},
    { part:"CNC 밀링", id:"2024-1회 46번", q:"다음 중 NC의 서보기구에 대한 설명으로 옳은 것은?", options:["NC 기계의 움직임을 전기적 신호로 표시하는 회전 피드백 장치","NC Tape에 기록된 언어(정보)를 받아서 펄스화시키는 기구","구동모터의 회전속도와 위치를 피드백시켜 입력량과 출력량이 같아지도록 제어할 수 있는 구동기구","여러 대의 NC 공작기계를 한 대의 컴퓨터에 결합시켜 제어하는 시스템"], answer:3, explain:"서보기구는 피드백을 통해 입력/출력을 맞추는 제어(3번)이다."},
    { part:"CNC 밀링", id:"2024-1회 47번", q:"CNC 프로그램의 끝과 관련이 없는 보조기능은?", options:["M99","M02","M30","M98"], answer:4, explain:"M98은 보조프로그램 호출 기능이다."},
    { part:"CNC 밀링", id:"2024-1회 48번", q:"G코드에 대한 설명으로 옳지 않은 것은?", options:["G코드가 다른 그룹이면 몇 개라도 동일 블록에 지명하여 실행시킬 수 있다.","동일 그룹에 속하는 G코드는 같은 블록에 2개 이상 지령하면 나중에 지령한 G코드만 유효하거나 경보가 발생한다.","00 그룹의 G코드는 연속 유효(Modal) G코드이다.","G코드 일람표에 없는 G코드를 지령하면 정보가 발생한다."], answer:3, explain:"00 그룹의 G코드는 명령된 블록에서만 유효한 원샷 G코드이다."},
    { part:"CNC 밀링", id:"2024-1회 49번", q:"CNC 공작기계에서 이송기능에 사용되는 주소(Address)는?", options:["M","G","T","F"], answer:4, explain:"F(Feed)는 이송속도를 지령한다."},
    { part:"CNC 밀링", id:"2024-1회 50번", q:"CNC 공작기계에서 전원을 투입한 후 일반적으로 제일 처음하는 것은?", options:["좌표계 설정","기계원점 복귀","제2원점 복귀","자동 공구 교환"], answer:2, explain:"일반적으로 기계원점 복귀를 먼저 한다."},
    { part:"CNC 밀링", id:"2024-1회 51번", q:"머시닝센터에서 Ø12-2날 초경합금 엔드밀을 이용하여 절삭속도 35m/min, 이송 0.05mm/날로 가공하고자 할 때 이송속도 F는?", options:["12.25","35.0","92.8","928.0"], answer:3, explain:"N=π×D×? 형식(예시): N≈928rpm, F=0.05×2×928=92.8mm/min."},
    { part:"CNC 밀링", id:"2024-1회 52번", q:"머시닝센터 프로그램에 관한 설명으로 옳지 않은 것은?", options:["절대 명령은 G90으로 지령한다.","증분 명령은 G92로 지령한다.","증분 명령은 공구 이동 시작점부터 끝점까지의 이동량을 명령하는 방법이다.","절대 명령은 공구 이동 끝점의 위치를 공작물 좌표계의 원점을 기준으로 명령하는 방법이다."], answer:2, explain:"증분 명령은 G91이다. G92는 좌표계 설정이다."},
    { part:"CNC 밀링", id:"2024-1회 54번", q:"머시닝센터 프로그램에서 고정 사이클을 취소하는 준비기능은?", options:["G76","G80","G83","G87"], answer:2, explain:"G80이 고정 사이클 취소."},
    { part:"CNC 밀링", id:"2024-1회 55번", q:"CNC 프로그램에서 EOB의 뜻은?", options:["블록의 종료","프로그램의 종료","주축의 정지","보조기능의 정지"], answer:1, explain:"EOB(End of Block)는 블록의 끝을 나타낸다."},
    { part:"CNC 밀링", id:"2024-1회 56번", q:"공구의 최후 위치만 제어하는 것으로, 도중의 경로는 무시되는 G코드는?", options:["G00","G01","G02","G03"], answer:1, explain:"G00은 위치결정 명령이다."},
    { part:"CNC 밀링", id:"2024-1회 57번", q:"CNC 공작기계에서 정보 흐름의 순서가 옳은 것은?", options:["지령 펄스열 → 서보 구동 → 수치 정보 → 가공물","지령 펄스열 → 수치 정보 → 서보 구동 → 가공물","수치 정보 → 지령 펄스열 → 서보 구동 → 가공물","수치 정보 → 서보 구동 → 지령 펄스열 → 가공물"], answer:3, explain:"수치 정보 → 지령 펄스열 → 서보 구동 → 가공물 순."},
    { part:"CNC 밀링", id:"2024-1회 58번", q:"머시닝센터 조작판에서 'DRY RUN' 기능에 대한 설명으로 옳은 것은?", options:["ON 되면 회전당 이송속도로 변한다.","ON 되면 이송속도가 약간 빨라진다.","ON 되면 프로그램의 이송속도를 무시하고 조작판의 이송속도로 이송한다.","ON 되면 이송속도가 최고속도로 변한다."], answer:3, explain:"DRY RUN ON 시 프로그램의 이송속도를 무시하고 조작판의 이송속도로 이송한다."},

    { part:"기계재료 및 요소", id:"2024-1회 09번", q:"원주피치 P, 원주율 π라 할 때, 모듈 m을 구하는 식은?", options:["m=π/P","m=P/π","m=πP","m=2πP"], answer:2, explain:"m = π / P"},
    { part:"기계재료 및 요소", id:"2024-1회 10번", q:"벨트풀리의 설계에서 림(Rim)의 중앙부를 약간 높게 만드는 이유는?", options:["제작이 용이하기 때문에","풀리의 강도 증대와 마모를 고려하여","벨트가 벗겨지는 것을 방지하기 위하여","벨트의 착탈이 용이하도록 하기 위하여"], answer:3, explain:"림 중앙부를 높여 벨트 이탈을 방지하기 위함."},
    { part:"기계재료 및 요소", id:"2024-1회 11번", q:"절구 베어링이라고도 하며, 세워져 있는 축에 의하여 추력을 받을 때 사용되는 것은?", options:["피벗 베어링","칼라 베어링","단일체 베어링","분할 베어링"], answer:1, explain:"추력을 받을 때 쓰는 절구 베어링(피벗 베어링)."},
    { part:"기계재료 및 요소", id:"2024-1회 12번", q:"소선의 지름이 8mm, 스프링 전체의 평균 지름이 80mm인 압축코일 스프링의 스프링 지수는?", options:["10","40","64","72"], answer:1, explain:"C = d/D = 8/80 = 10"},
    { part:"기계재료 및 요소", id:"2024-1회 13번", q:"길이가 200mm인 스프링에 100N의 물체를 달았더니 길이가 240mm로 늘어났다. 이때 스프링 상수(N/mm)는?", options:["1","2","2.5","4"], answer:3, explain:"k = δ/W = (240-200)/100 = 2.5 N/mm"},
    { part:"기계재료 및 요소", id:"2024-1회 14번", q:"다음 중 핀에 대한 설명으로 잘못된 것은?", options:["테이퍼핀의 기울기는 1/50이다.","분할핀은 너트의 풀림 방지에 사용된다.","테이퍼핀은 굵은 쪽의 지름으로 크기를 표시한다.","핀의 재질은 보통 강재이고 황동, 구리 등으로 만든다."], answer:3, explain:"테이퍼핀은 작은 쪽의 지름으로 크기를 표시한다."},
    { part:"기계재료 및 요소", id:"2024-1회 19번", q:"3줄 나사의 피치가 3mm일 때, 리드는 얼마인가?", options:["1mm","3mm","6mm","9mm"], answer:4, explain:"리드 L = n×p = 3×3 = 9mm"},
    { part:"기계재료 및 요소", id:"2024-1회 20번", q:"롤러 베어링의 호칭번호 6302에서 베어링 안지름 호칭을 표시하는 것은?", options:["6","63","0","02"], answer:4, explain:"'02'는 안지름 15mm를 의미한다."},
    { part:"기계공작법", id:"2024-1회 27번", q:"연삭가공의 일반적인 특징에 대한 설명으로 옳지 않은 것은?", options:["치수 정밀도가 높다.","칩의 크기가 매우 작다.","가공면의 표면거칠기가 불량하다.","경화된 강과 같은 단단한 재료를 가공할 수 있다."], answer:3, explain:"연삭은 치수 정밀도가 높고 표면거칠기가 우수한 다듬질 가공이다."},
    { part:"기계공작법", id:"2024-1회 32번", q:"연삭가공 중 숫돌바퀴의 질이 균일하지 못하거나 일감의 영향을 받으면 숫돌바퀴의 모양이 점차 변한다. 이렇게 변형된 숫돌을 정확한 모양으로 바르게 고치는 작업은?", options:["드레싱","밸런싱","채터링","트루잉"], answer:4, explain:"트루잉(Truing)은 숫돌을 성형하거나 바른 모양으로 고치는 가공이다."},
    { part:"기계공작법", id:"2024-1회 34번", q:"일반적으로 드릴링 머신에서 가공하기 곤란한 작업은?", options:["카운터 싱킹","스플라인 홈","스폿 페이싱","리밍"], answer:2, explain:"스플라인 홈 가공은 브로칭(Broaching) 머신에서 수행한다."},
    { part:"기계공작법", id:"2024-1회 35번", q:"화학적 가공의 일반적인 특징에 대한 설명으로 옳지 않은 것은?", options:["가공경화나 표면의 변질층이 생긴다.","재료의 표면 전체를 동시에 가공할 수 있다.","재료의 경도나 강도에 관계없이 가공할 수 있다.","변형이나 거스러미가 발생하지 않는다."], answer:1, explain:"화학적 가공은 가공경화 또는 표면 변질층이 발생하지 않는다."},
    { part:"기계공작법", id:"2024-1회 36번", q:"소재의 불필요한 부분을 칩(Chip)의 형태로 제거하여 원하는 최종 형상을 만드는 가공법은?", options:["소성가공법","접합가공법","절삭가공법","분말야금법"], answer:3, explain:"칩 형태로 제거하는 것은 절삭가공법이다."},
    { part:"기계공작법", id:"2024-1회 39번", q:"다음 중 공작기계를 절삭운동 방식에 따라 분류할 때 일감의 운동이 다른 것은?", options:["선반","보링머신","밀링머신","플레이너"], answer:2, explain:"선반, 밀링머신, 플레이너는 일감이 운동(회전 또는 직선)하지만 보링머신은 일감이 고정된다."},
    { part:"기계공작법", id:"2024-1회 40번", q:"다음 중 수나사를 가공하는 공구는?", options:["탭","줄","리머","다이스"], answer:4, explain:"탭은 암나사, 다이스는 수나사 가공에 사용한다."},
    { part:"기계공작법", id:"2024-1회 41번", q:"센터리스 연삭기의 장점이 아닌 것은?", options:["연삭 여유가 작아도 된다.","대형이나 중량물의 연삭에 적합하다.","대량 생산에 적합하다.","긴 축 재료의 연삭이 가능하다."], answer:2, explain:"센터리스 연삭기는 대형이나 중량물의 연삭은 불가능하다."},
    { part:"기계공작법", id:"2024-1회 44번", q:"다음 중 CAD/CAM 시스템의 하드웨어에 해당하는 것은?", options:["운영체제(OS)","입출력장치","응용 소프트웨어","데이터베이스 시스템"], answer:2, explain:"입출력장치는 하드웨어에 해당한다."},

    { part:"안전규정준수", id:"2024-1회 15번", q:"기계운동을 정지 또는 감속 조절하여 위험을 방지하는 장치는?", options:["기어","커플링","마찰차","브레이크"], answer:4, explain:"브레이크는 정지/감속하여 위험을 방지한다."},
    { part:"안전규정준수", id:"2024-1회 53번", q:"CNC 기계가공 중 충돌사고가 발생할 위험이 있을 때, 응급처치로 가장 옳은 것은?", options:["선택적 정지 버튼을 누른다.","원상 복귀 버튼을 누른다.","가공 시작 버튼을 누른다.","비상 정지 버튼을 누른다."], answer:4, explain:"충돌 위험 시 비상 정지 버튼을 누른다."},
    { part:"안전규정준수", id:"2024-1회 59번", q:"기계가공을 하고자 할 때 유의사항으로 옳지 않은 것은?", options:["복장을 단정히 한다.","공작물을 기계에 단단히 고정시킨다.","정밀가공은 문을 열고 한다.","기계를 사용하기 전에 이상 유무를 확인한다."], answer:3, explain:"기계가공 시 안전을 위해 문을 열고 가공하면 위험하다."},
    { part:"안전규정준수", id:"2024-1회 60번", q:"다음 중 CNC 공작기계의 안전에 관한 사항으로 옳지 않은 것은?", options:["절삭가공 시 절삭조건을 알맞게 설정한다.","공정도와 공구 세팅 시트를 작성 후 검토하고 입력한다.","공구경로 확인은 보조기능(M기능)이 작동(ON)된 상태에서 한다.","기계 가동 전에 비상 정지 버튼의 위치를 반드시 확인한다."], answer:3, explain:"공구경로 확인은 보조기능(M기능)이 정지(OFF)된 상태에서 해야 한다."},
    // ===== 2024년 2회 (추가) =====
    // 1. 기계재료
    { part:"기계재료 및 요소", id:"2024-2회 01번", q:"황동의 기계적 성질과 물리적 성질에 대한 설명으로 틀린 것은?", options:["30% Zn 부근에서 최대의 연신율을 나타낸다.","45% Zn에서 인장강도가 최대로 된다.","50% Zn 이상의 황동은 취약하여 구조용재에는 부적합하다.","전도도는 50% Zn에서 최소가 된다."], answer:4, explain:"황동의 전기전도율은 50% Zn에서 최댓값이 됩니다."},
    { part:"기계재료 및 요소", id:"2024-2회 02번", q:"청동은 주석의 함유량이 몇 % 정도일 때, 연신율이 최대가 되는가?", options:["4~5%","11~15%","16~19%","20~22%"], answer:1, explain:"연신율은 4~5% Sn 부근에서 최댓값이 되고, 그 뒤로는 Sn의 양에 따라 적어진다."},
    { part:"기계재료 및 요소", id:"2024-2회 03번", q:"용융온도가 3,400℃ 정도로 높은 고용융점 금속으로 전구의 필라멘트 등에 쓰이는 금속재료는?", options:["납","금","텅스텐","망간"], answer:3, explain:"용융온도가 매우 높은 고용융점 금속으로 전구 필라멘트 등에 쓰이는 금속재료는 텅스텐이다."},
    { part:"기계재료 및 요소", id:"2024-2회 04번", q:"금속에 있어서 대표적인 결정격자와 관계없는 것은?", options:["체심입방격자","면심입방격자","조밀입방격자","조밀육방격자"], answer:3, explain:"금속의 결정격자에는 면심입방격자(금, 구리), 체심입방격자(크롬, 몰리브덴), 조밀육방격자(코발트, 마그네슘) 등이 있으며 조밀입방격자는 대표적인 결정격자가 아니다."},
    { part:"기계재료 및 요소", id:"2024-2회 05번", q:"재료를 상온에서 다른 형상으로 변형시킨 후 원래 모양으로 회복되는 온도로 가열하면 원래 모양으로 돌아오는 것은?", options:["제진합금","형상기억합금","비정질합금","초전도합금"], answer:2, explain:"형상기억합금은 소성변형된 것이 특정 온도 이상으로 가열하면 변형되기 이전의 원래 상태로 돌아가는 합금이다."},
    { part:"기계재료 및 요소", id:"2024-2회 06번", q:"탄소강에 인(P)이 주는 영향이 아닌 것은?", options:["연신율 증가","충격치 감소","강도 및 경도 증가","가공 시 균열"], answer:1, explain:"인(P)은 강재의 결정을 조대하게 하고 강도와 인장강도를 다소 증가시키나 연신율은 줄고 상온에서 충격값이 작아져 가공 시 균열이 생기기 쉽다(상온취성). 따라서 연신율 증가는 옳지 않다."},
    { part:"기계재료 및 요소", id:"2024-2회 07번", q:"일반 탄소강보다 P, S의 함유량을 많게 하거나 Pb, Se, Zr 등을 첨가하여 제조한 강은?", options:["스프링 강","쾌삭강","구조용 탄소강","탄소 공구강"], answer:2, explain:"쾌삭강은 가공재료의 피삭성을 높이고 절삭공구의 수명을 길게 하기 위하여 요구되는 성질을 개선한 강이다."},
    { part:"기계재료 및 요소", id:"2024-2회 26번", q:"다음 중 절삭공구용 재료가 가져야 할 기계적 성질 중 옳은 것을 모두 고르면? (㉠ 고온경도, ㉡ 취성, ㉢ 내마모성, ㉣ 강인성)", options:["㉠, ㉡, ㉢","㉠, ㉡, ㉣","㉠, ㉢, ㉣","㉡, ㉢, ㉣"], answer:3, explain:"절삭공구는 고온 경도, 내마모성, 강인성, 저마찰, 성형성 등을 갖추어야 하며, 취성(깨지기 쉬운 성질)은 적어야 한다."},
    { part:"기계재료 및 요소", id:"2024-2회 49번", q:"와이어 컷 방전가공의 와이어 전극 재질로 적합하지 않은 것은?", options:["황동","구리","텅스텐","납"], answer:4, explain:"와이어 전극 재질로는 황동, 구리, 텅스텐 등이 사용된다."},

    // 2. 기계제도

    { part:"기계제도", id:"2024-2회 16번", q:"기준 원 위에서 원판을 굴릴 때 원판 위의 1점이 그리는 궤적으로 나타내는 선은?", options:["쌍곡선","포물선","인벌류트 곡선","사이클로이드 곡선"], answer:4, explain:"사이클로이드 곡선은 작은 구름원이 피치원의 바깥 둘레를 미끄럼 없이 굴러갈 때 원주상의 한 점이 그리는 궤적입니다."},
    { part:"기계제도", id:"2024-2회 17번", q:"기어를 제도할 때 피치원을 표시하는 선은?", options:["가는 1점쇄선","가는 파선","가는 2점쇄선","가는 실선"], answer:1, explain:"피치원을 표시하는 선은 가는 1점쇄선이다."},
    { part:"기계제도", id:"2024-2회 18번", q:"스프링의 도시법에서 스프링의 종류 및 모양만 간략도로 도시하는 경우에 사용하는 스프링 재료의 중심선은?", options:["가는 1점 쇄선","가는 2점 쇄선","가는 실선","굵은 실선"], answer:4, explain:"코일 스프링의 종류와 모양만 간략도로 나타내는 경우에는 재료의 중심선만 굵은 실선으로 도시한다."},
    { part:"기계제도", id:"2024-2회 19번", q:"다음 그림에서 a는 표면거칠기의 지시사항 중 어느 것에 해당하는가?", options:["가공방법","줄무늬 방향의 기호","표면거칠기의 지시값","표면파상도"], answer:3, explain:"a는 산술 평균 거칠기의 값을 의미한다.",image:"24219.png"},
    { part:"기계제도", id:"2024-2회 20번", q:"다음 중 자세공차의 종류로만 짝지어진 것은?", options:["진직도 공차, 진원도 공차","평행도 공차, 경사도 공차","원통도 공차, 대칭도 공차","윤곽도 공차, 온 흔들림 공차"], answer:2, explain:"자세공차에는 평행도, 직각도, 경사도가 포함된다."},
    { part:"기계제도", id:"2024-2회 21번", q:"기계제도에서 가는 실선이 사용되지 않는 것은?", options:["외형선","치수선","지시선","치수보조선"], answer:1, explain:"외형선은 굵은 실선을 사용한다."},
    { part:"기계제도", id:"2024-2회 22번", q:"보조투상도를 사용해야 될 곳으로 가장 적당한 경우는?", options:["가공 전후의 모양을 투상할 때","특정 부분의 형상이 작아 이를 확대하여 자세하게 나타낼 때","물체 경사면의 실형을 나타낼 때","물체에 대한 단면은 90° 회전하여 나타낼 때"], answer:3, explain:"경사면을 지니고 있는 물체를 정투상도로 그리면 실제 모양을 나타낼 수 없으므로 보조투상도로 실형을 나타낸다."},
    { part:"기계제도", id:"2024-2회 23번", q:"개개의 치수에 주어진 치수공차가 축차로 누적되어도 좋은 경우에 사용하는 치수의 배치법은?", options:["직렬치수기입법","병렬치수기입법","좌표치수기입법","누진치수기입법"], answer:1, explain:"직렬치수기입법은 직렬로 나란히 연결된 치수로, 개별 공차가 누적되어도 상관없는 경우에 사용한다."},
    { part:"기계제도", id:"2024-2회 24번", q:"축과 구멍의 끼워맞춤에서 최대틈새는?", options:["구멍의 최대허용치수 - 축의 최소허용치수","구멍의 최소허용치수 - 축의 최대허용치수","축의 최대허용치수 - 축의 최소허용치수","구멍의 최소허용치수 - 구멍의 최대허용치수"], answer:1, explain:"최대틈새 = 구멍의 최대허용치수 - 축의 최소허용치수."},
    { part:"기계제도", id:"2024-2회 25번", q:"도형이 대칭인 경우 대칭 중심선의 한쪽 도형만 작도할 때 중심선의 양 끝부분의 작도방법은?", options:["짧은 2개의 평행한 굵은 1점쇄선","짧은 2개의 평행한 가는 1점쇄선","짧은 2개의 평행한 굵은 실선","짧은 2개의 평행한 가는 실선"], answer:4, explain:"대칭 중심선의 양 끝부분에 짧은 2개의 나란한 가는 실선을 그린다."},

    // 3. 측정
    { part:"기계공작법", id:"2024-2회 27번", q:"다음 중 게이지 블록과 함께 사용하여 삼각함수 계산식을 이용하여 각도를 구하는 것은?", options:["수준기","사인바","요한슨식 각도게이지","콤비네이션 세트"], answer:2, explain:"사인바(Sine Bar)는 게이지 블록과 함께 사용하여 길이를 측정하여 삼각함수 계산으로 임의의 각을 측정하거나 설정하는 기구입니다."},
    { part:"기계공작법", id:"2024-2회 38번", q:"축 지름의 치수를 직접 측정할 수는 없으나 기계 부품이 허용공차 안에 들어 있는지를 검사하는 데 가장 적합한 측정기능은?", options:["한계게이지","버니어 캘리퍼스","외경 마이크로미터","사인바"], answer:1, explain:"한계게이지는 기계 부품이 허용공차 안에 들어 있는지를 검사하는 측정기기입니다."},
    { part:"기계공작법", id:"2024-2회 42번", q:"내경이 20mm이고, 깊이가 50mm인 공작물의 안지름을 가장 정확하게 측정할 수 있는 기기는?", options:["실린더게이지","사인 바","블록게이지","M형 버니어 캘리퍼스"], answer:1, explain:"실린더게이지는 원통 내면에 넣어 축 방향의 최소 치수를 구하는 데 사용된다."},

    // 4. 밀링가공
    { part:"기계공작법", id:"2024-2회 28번", q:"다음 중 일반적으로 절삭유제에서 요구되는 조건이 아닌 것은?", options:["유막의 내압력이 높을 것","냉각성이 우수할 것","가격이 저렴할 것","마찰계수가 높을 것"], answer:4, explain:"절삭유는 마찰계수가 작아야 절삭 저항이 줄어듭니다."},
    { part:"기계공작법", id:"2024-2회 31번", q:"밀링커터 중 절단 또는 좁은 홈파기에 가장 적합한 것은?", options:["총형 커터","엔드밀","메탈 슬리팅 소","정면 밀링커터"], answer:3, explain:"메탈 슬리팅 소(Metal Slitting Saw)는 절단 및 홈 가공 시 사용됩니다."},
    { part:"기계공작법", id:"2024-2회 33번", q:"다음 중 정면 밀링커터와 엔드밀을 사용하여 평면 가공, 홈가공 등의 작업에 가장 적합한 밀링머신은?", options:["공구밀링머신","특수밀링머신","모방밀링머신","수직밀링머신"], answer:4, explain:"수직 밀링머신은 주축이 테이블에 수직으로 되어 있어 정면 밀링커터, 엔드밀 가공에 적합하다."},
    { part:"기계공작법", id:"2024-2회 39번", q:"공구의 수명에 관한 설명으로 옳지 않은 것은?", options:["일감을 일정한 절삭조건으로 절삭하기 시작하여 깎을 수 없게 되기까지의 총절삭시간을 분(min)으로 나타낸 것이다.","공구의 수명은 마멸이 주된 원인이며, 열 또한 원인이다.","공구의 윗면에서는 경사면 마멸, 옆면에서는 여유면 마멸이 나타난다.","공구의 수명은 높은 온도에서 길어진다."], answer:4, explain:"절삭 온도의 상승은 공구의 수명을 감소시키는 원인이 된다."},

    // 5. CNC 밀링
    { part:"CNC 밀링", id:"2024-2회 43번", q:"프로그램 구성에서 단어(Word)는 무엇으로 구성되어 있는가?", options:["주소+수치","주소+주소","수치+수치","수치+EOB"], answer:1, explain:"단어(Word)는 주소(Address)와 수치(Data)로 구성된다."},
    { part:"CNC 밀링", id:"2024-2회 44번", q:"다음 중 머시닝센터 작업 시에 일시적으로 좌표를 '0'(Zero)으로 설정할 때 사용하는 좌표계는?", options:["기계 좌표계","극좌표계","상대 좌표계","잔여 좌표계"], answer:3, explain:"상대 좌표계는 일시적으로 좌표를 '0'으로 설정할 때 사용된다."},
    { part:"CNC 밀링", id:"2024-2회 45번", q:"다음 중 백래시(Backlash) 보정기능의 설명으로 옳은 것은?", options:["축의 이동이 한 방향에서 반대 방향으로 이동할 때 발생하는 편차값을 보정하는 기능","볼 스크루의 부분적인 마모현상으로 발생된 피치 간의 편차값을 보정하는 기능","백보링 기능의 편차량을 보정하는 기능","한 방향 위치결정기능의 편차량을 보정하는 기능"], answer:1, explain:"백래시 보정은 축 이동 방향 전환 시 발생하는 편차를 보정하는 기능이다."},
    { part:"CNC 밀링", id:"2024-2회 46번", q:"다음 중 CNC 공작기계 제어방식의 종류가 아닌 것은?", options:["직선절삭 제어","위치결정 제어","원곽절삭 제어","윤곽절삭 제어"], answer:3, explain:"제어방식에는 위치결정 제어, 직선절삭 제어, 윤곽절삭 제어가 있다(원곽절삭은 제어방식 분류 항목이 아님)." },
    { part:"CNC 밀링", id:"2024-2회 47번", q:"다음 머시닝센터 프로그램에서 G98의 의미로 옳은 것은? (G17 G90 G98 G83 Z-25.0 R3.0 Q2.0 F120;)", options:["보조프로그램 호출","1회 절입량","R점 복귀","초기점 복귀"], answer:4, explain:"G98은 초기점 복귀를 의미한다."},
    { part:"CNC 밀링", id:"2024-2회 48번", q:"머시닝센터에서 T02를 기준 공구로 하여 T06 공구를 길이 보정하려고 한다. G43 코드를 이용할 경우 T06 공구의 길이 보정량으로 옳은 것은? (T02 길이 69, T06 길이 80)", options:["11","-11","80","-80"], answer:1, explain:"기준공구(69)보다 T06(80)이 11 더 길어 보정량은 +11이다."},
    { part:"CNC 밀링", id:"2024-2회 50번", q:"다음 중 머시닝센터 고정 사이클에서 태핑 사이클로 적당한 G기능은?", options:["G81","G82","G83","G84"], answer:4, explain:"G84는 태핑 사이클이다."},
    { part:"CNC 밀링", id:"2024-2회 51번", q:"프로그램을 편리하게 하기 위하여 도면에 있는 임의의 점을 프로그램상의 절대좌표 기준점으로 정한 점을 무엇이라 하는가?", options:["제2원점","제3원점","기계원점","프로그램 원점"], answer:4, explain:"프로그램 원점은 도면의 임의의 점을 절대좌표 기준점으로 정한 점이다."},
    { part:"CNC 밀링", id:"2024-2회 52번", q:"곡면 형상의 모델링에서 임의의 곡선을 회전축을 중심으로 회전시킬 때 발생하여 얻어진 면은?", options:["회전 곡면","로프트 곡면","룰드 곡면","메시 곡면"], answer:1, explain:"회전축을 중심으로 회전시켜 얻어진 면은 회전 곡면이다."},
    { part:"CNC 밀링", id:"2024-2회 53번", q:"다음 중 머시닝센터에서 원호보간 시 사용되는 I, J의 의미로 옳지 않은 것은?", options:["I는 X축 보간에 사용된다.","J는 Y축 보간에 사용된다.","원호의 시작점에서 원호 끝점까지의 벡터값이다.","원호의 시작점에서 원호 중심까지의 벡터값이다."], answer:3, explain:"I, J는 원호의 시작점에서 원호 중심까지의 벡터값이다."},
    { part:"CNC 밀링", id:"2024-2회 54번", q:"다음 중 복합가공기와 가장 유사한 방식은?", options:["CNC","FMC","FMS","CIMS"], answer:2, explain:"FMC(Flexible Manufacturing Cell)는 하나의 CNC 공작기계에 공작물 공급 장치 및 자동 공구 교환 장치를 갖춘 시스템이다."},
    { part:"CNC 밀링", id:"2024-2회 55번", q:"다음 중 수치제어밀링에서 증분 명령(Incremental)으로 프로그래밍한 것은?", options:["G90 X20. Y20. Z50.;","G90 U20. V20. W50.;","G91 X20. Y20. Z50.;","G91 U20. V20. W50.;"], answer:3, explain:"증분지령은 G91이며 주소는 X, Y, Z를 사용한다."},
    { part:"CNC 밀링", id:"2024-2회 56번", q:"머시닝센터 프로그램의 일부에서 빈칸에 알맞은 것은? (G90 G92 X0. Y0. Z100.; (㉠) 1500 M03;)", options:["S","G42","F","G03"], answer:3, explain:"1,500rpm 정회전이므로 주축 기능 S가 지령되어야 한다."},

    { part:"CNC 밀링", id:"2024-2회 57번", q:"머시닝센터에서 M10 x 1.5 탭 가공을 하기 위한 프로그램에서 이송속도는 얼마인가? (S300 M03; G84 G99 Z-10. R5. F_;)", options:["150mm/min","300mm/min","450mm/min","600mm/min"], answer:3, explain:"탭 사이클의 이송속도는 회전수(300) x 피치(1.5) = 450mm/min이다."},
    { part:"CNC 밀링", id:"2024-2회 59번", q:"머시닝센터에서 Ø10 엔드밀로 40 x 40 정사각형 외곽 가공 후 측정하였더니 41 x 41로 가공되었다. 공구지름 보정량이 5일 때 얼마로 수정하여야 하는가?", options:["5","4.5","5.5","6"], answer:2, explain:"수정 보정값 = 기존 보정값(5) - (공차/4) = 5 - (2/4) = 4.5이다."},

    { part:"기계재료 및 요소", id:"2024-2회 11번", q:"모듈이 2이고, 잇수가 각각 36, 74개인 두 기어가 맞물려 있을 때 축간거리는 몇 mm인가?", options:["100mm","110mm","120mm","130mm"], answer:2, explain:"중심거리 = (36+74)×2/2 = 110mm이다."},
    { part:"기계재료 및 요소", id:"2024-2회 12번", q:"유체가 나사의 접촉면 사이의 틈새나 볼트의 구멍으로 흘러나오는 것을 방지할 필요가 있을 때 사용하는 너트는?", options:["캡 너트","홈붙이 너트","플랜지 너트","슬리브 너트"], answer:1, explain:"유체 유출을 방지할 때 사용하는 너트는 캡 너트이다."},
    { part:"기계재료 및 요소", id:"2024-2회 13번", q:"키의 너비만큼 축을 평행하게 가공하고, 안장키보다 약간 큰 토크 전달이 가능하게 제작된 키는?", options:["접선키","평 키","원뿔키","둥근키"], answer:2, explain:"키의 너비만큼 평행하게 가공하고 토크 전달을 크게 하는 키는 평 키이다."},
    { part:"기계재료 및 요소", id:"2024-2회 14번", q:"두 축이 평행하지만 축 선의 위치가 어긋나 있을 때 사용하는 커플링은?", options:["셀러 커플링","유니버설 커플링","올덤 커플링","마찰 클러치"], answer:3, explain:"올덤 커플링은 두 축이 평행하지만 축선 위치가 어긋나 있을 때 사용한다."},
    { part:"기계공작법", id:"2024-2회 29번", q:"다음 중 연삭숫돌의 구성요소가 아닌 것은?", options:["숫돌입자","결합제","기공","드레싱"], answer:4, explain:"드레싱은 숫돌을 수정하는 작업이며 구성요소는 입자, 결합제, 기공이다."},

    { part:"기계공작법", id:"2024-2회 32번", q:"나사머리가 접시모양일 때, 테이퍼 원통형으로 절삭가공하는 것은?", options:["리밍","카운터 보링","카운터 싱킹","스폿 페이싱"], answer:3, explain:"접시머리 나사를 테이퍼 원통형으로 가공하는 것은 카운터 싱킹이다."},
    { part:"기계공작법", id:"2024-2회 34번", q:"특정한 모양이나 치수의 제품을 대량 생산하는 데 적합하도록 만든 공작기계는?", options:["표준공작기계","만능공작기계","범용공작기계","전용공작기계"], answer:4, explain:"특정 모양이나 치수의 제품을 대량 생산하는 데 적합하도록 만든 공작기계는 전용공작기계이다."},
    { part:"기계공작법", id:"2024-2회 35번", q:"액체호닝(Liquid Honing)에 대한 설명으로 옳지 않은 것은?", options:["가공시간이 짧다.","형상이 복잡한 일감은 가공이 어렵다.","일감 표면의 산화막이나 도료 등을 제거할 수 있다.","공작물에 피로강도를 향상시킬 수 있다."], answer:2, explain:"액체호닝은 형상이 복잡한 것도 쉽게 가공할 수 있다."},
    { part:"기계공작법", id:"2024-2회 36번", q:"연삭가공에서 공작물 1회전마다의 이송은 숫돌 폭 이하로 하여야 한다. 다듬질 연삭 시 이송속도는 대략 몇 m/min 정도로 하여야 하는가?", options:["0.5~1","0.20.4","0.01~0.05","0.05~0.1"], answer:3, explain:"다듬질 연삭에서는 0.2~0.4m/min의 범위가 적당하다."},
    { part:"기계공작법", id:"2024-2회 37번", q:"다음 중 자루와 날의 부위가 별개로 되어 있는 리머는?", options:["조정 리머","팽창 리머","솔리드 리머","쉘 리머"], answer:4, explain:"자루와 날이 별개로 되어 있는 리머는 쉘 리머이다."},
    { part:"기계공작법", id:"2024-2회 40번", q:"드릴의 표준 날끝 선단각은 몇 도인가?", options:["118°","135°","163°","181°"], answer:1, explain:"드릴의 표준 날끝 선단각은 118°이다."},
    { part:"기계공작법", id:"2024-2회 41번", q:"연삭숫돌의 결합도 선정 기준으로 틀린 것은?", options:["숫돌의 원주속도가 빠를 때는 연한 숫돌을 사용한다.","연삭 깊이가 얕을 때는 경한 숫돌을 사용한다.","공작물의 재질이 연하면 연한 숫돌을 사용한다.","공작물과 숫돌의 접촉 면적이 작으면 경한 숫돌을 사용한다."], answer:3, explain:"공작물의 재질이 연하면 경한 숫돌을 사용하는 것이 결합도 선정 기준이다."},

  { part:"기계공작법", id:"2023-2회 16번", q:"밀링가공 시 분할대를 사용하여 분할하는 방법이 아닌 것은?", options:["직접분할법","간접분할법","차동분할법","단식분할법"], answer:2, explain:"밀링의 분할방법은 직접 분할, 단식 분할, 차동 분할이 있습니다." },
  { part:"기계공작법", id:"2023-2회 17번", q:"수직 밀링머신에서 사용하는 절삭공구가 아닌 것은?", options:["엔드밀","T홈 커터","더브테일 커터","플레인 밀링커터"], answer:4, explain:"플레인 밀링커터는 수평 밀링머신용 공구입니다." },
  { part:"기계공작법", id:"2023-2회 45번", q:"절삭가공 시 열이 발생하는 이유와 가장 관계가 적은 것은?", options:["칩과 경사면 마찰","공구 여유면을 따라 칩이 일어날 때","전단면의 소성 변형","여유면과 공작물 표면 마찰"], answer:2, explain:"절삭열은 전단 변형이 일어날 때와 칩이 공구 경사면을 따라 흐르며 마찰할 때 발생합니다." },
  { part:"기계공작법", id:"2023-2회 56번", q:"밀링작업에서 T홈 절삭을 하기 위해서 선행해야 할 작업은?", options:["엔드밀 홈 작업","더브테일 홈 작업","나사 밀링커터 작업","총형 밀링커터 작업"], answer:1, explain:"T홈을 가공하기 위해서는 먼저 엔드밀을 이용하여 홈을 절삭해야 합니다." },

  { part:"CNC 밀링", id:"2023-2회 37번", q:"상대값을 가지는 좌표계로 현재의 위치가 원점이 되는 좌표계는?", options:["공작물좌표계","극좌표계","상대좌표계","기계좌표계"], answer:3, explain:"(원문 답변 기준) 상대좌표계" },
  { part:"CNC 밀링", id:"2023-2회 40번", q:"머시닝센터 프로그램에서 고정 사이클을 취소하는 준비기능은?", options:["G76","G80","G83","G87"], answer:2, explain:"(원문 답변 기준) G80" },
  { part:"CNC 밀링", id:"2023-2회 46번", q:"1.5초 동안 일시정지(G04) 기능의 명령으로 틀린 것은?", options:["G04 U1.5;","G04 X1.5;","G04 P1.5;","G04 P1500;"], answer:3, explain:"주소 P를 사용하여 시간을 지령할 때는 소수점을 사용할 수 없으므로 P1500으로 써야 합니다." },
  { part:"CNC 밀링", id:"2023-2회 53번", q:"머시닝센터 고정 사이클에서 매회 절입량을 지정하는 어드레스는?", options:["① R","② O","③ Q","④ P"], answer:3, explain:"G73, G83 코드에서 Q는 매회 절입량을 지정하는 주소입니다." },
  { part:"CNC 밀링", id:"2023-2회 55번", q:"CNC 프로그램의 어드레스와 그 기능이 틀린 것은?", options:["① 준비기능 G","② 이송기능 F","③ 주축기능 S","④ 휴지기능 T"], answer:4, explain:"휴지(Dwell) 기능에 사용하는 주소는 P, X, U입니다. T는 공구기능입니다." },
  { part:"CNC 밀링", id:"2023-2회 57번", q:"CNC 공작기계가 한 번의 동작을 하는 데 필요한 정보가 담긴 지령 단위는?", options:["① 어드레스","② 데이터","③ 블록","④ 프로그램"], answer:3, explain:"(원문 답변 기준) 블록" },
  { part:"CNC 밀링", id:"2023-2회 59번", q:"여러 대의 CNC 공작기계를 한 대의 컴퓨터에 연결하여 운영하는 방식은?", options:["① NC","② CNC","③ DNC","④ CAD"], answer:3, explain:"(원문 답변 기준) DNC" },

  { part:"기계재료 및 요소", id:"2023-2회 18번", q:"축과 보스에 자동으로 조정되어 테이퍼 축의 회전체를 결합할 때 사용되는 키는?", options:["① 원뿔키","② 패더키","③ 반달키","④ 평 키"], answer:3, explain:"반달키(Woodruff Key)는 축의 홈이 깊어 강도가 약해지지만 자동으로 축에 자리를 잡을 수 있어 편리합니다." },
  { part:"기계재료 및 요소", id:"2023-2회 19번", q:"2개의 축이 평행하지만 축 선이 어긋나 있을 때 사용하는 커플링은?", options:["① 플렉시블 커플링","② 유니버설 커플링","③ 올덤 커플링","④ 마찰 클러치"], answer:3, explain:"(원문 답변 기준) 올덤 커플링" },
  { part:"기계재료 및 요소", id:"2023-2회 29번", q:"기계요소 분류 내용 중 틀린 것은?", options:["① 결합용: 나사/키","② 축용: 축/베어링","③ 전송용: 벨트/기어","④ 제동 및 완충용: 관 이음쇠/밸브"], answer:4, explain:"관 이음쇠와 밸브는 관용 기계요소입니다. 제동 및 완충용은 브레이크와 스프링입니다." },
  { part:"기계공작법", id:"2023-2회 33번", q:"줄의 종류에 해당하지 않는 것은?", options:["단목","복목","귀목","유목"], answer:4, explain:"(원문 답변 기준) 유목은 줄 종류에 해당하지 않음" },
  { part:"기계공작법", id:"2023-2회 34번", q:"기어 절삭방법에 해당하지 않는 것은?", options:["① 형판 이용","② 총형 커터 이용","③ 복식 공구대 이용","④ 창성법 이용"], answer:3, explain:"(원문 답변 기준) 복식 공구대 이용" },
  { part:"기계공작법", id:"2023-2회 35번", q:"숫돌입자 기호 중 경도가 가장 높은 것은?", options:["A","B","WA","GC"], answer:4, explain:"GC(녹색 탄화규소)는 경도가 최대이며 초경합금 연삭에 적합합니다." },
  { part:"기계공작법", id:"2023-2회 36번", q:"래핑의 설명으로 옳지 않은 것은?", options:["가공면 윤활성 우수","높은 정밀도 가공 가능","대량 생산 불가능","먼지가 많음"], answer:3, explain:"래핑은 가공이 간단하고 대량 생산이 가능합니다." },
  { part:"기계제도", id:"2023-2회 41번", q:"미터나사에 대한 설명으로 옳은 것은?", options:["① 나사산 각도 60°","② ABC 나사","③ 운동용 나사","④ 인치당 산 수로 표시"], answer:1, explain:"(원문 답변 기준) 나사산 각도 60°" },
  { part:"기계재료 및 요소", id:"2023-2회 42번", q:"볼 베어링 부품 중 볼을 일정한 간격으로 유지시켜 주는 것은?", options:["① 리테이너","② 레이스","③ 하우징","④ 부시"], answer:1, explain:"리테이너" },

  // 7. 안전규정준수
  { part:"안전규정준수", id:"2023-2회 58번", q:"CNC 공작기계 운전 시 일상 점검사항이 아닌 것은?", options:["공구 파손 확인","가공 재료 성분 분석","유압 상태 확인","계기 상태 확인"], answer:2, explain:"가공 재료 성분 분석은 일상 점검사항이 아님" },
  { part:"안전규정준수", id:"2023-2회 60번", q:"CNC 작업 중 기계 이상 발생 시 조치로 옳지 않은 것은?", options:["알람 확인","경보등 확인","조작설명서에 따라 조치","무조건 전원을 끈다"], answer:4, explain:"기계 이상 시 무조건 전원을 끄는 것은 적절한 조치가 아닙니다." },// ====== 추가 데이터 시작 ======
{ part:"기계재료 및 요소", id:"2022-1회 01번", q:"탄소 공구강 및 일반 공구재료의 구비조건이 아닌 것은?", options:["열처리성이 양호할 것","내마모성이 클 것","고온 경도가 클 것","부식성이 클 것"], answer:4, explain:"절삭유를 사용하기 때문에 부식성이 적어야(내식성이 커야) 합니다. 또한 피절삭재보다 경도와 인성이 커야 하며, 고온에서 경도가 감소되지 않고 내마모성과 내충격성이 좋아야 합니다."},
{ part:"기계재료 및 요소", id:"2022-1회 02번", q:"단위를 단면적에 대한 힘의 크기로 나타내는 것은?", options:["응력","변형률","연신율","단면 수축"], answer:1, explain:"응력(σ)은 물체에 하중을 가했을 때 내부에 발생하는 저항력으로, 단위면적당 힘의 크기(N/mm \n2\n )로 나타냅니다."},
{ part:"기계재료 및 요소", id:"2022-1회 03번", q:"스테인리스강을 조직상으로 분류한 것 중 틀린 것은?", options:["마텐자이트계","오스테나이트계","시멘타이트계","페라이트계"], answer:3, explain:"스테인리스강은 조직에 따라 페라이트계, 오스테나이트계, 마텐자이트계로 분류됩니다."},
{ part:"기계재료 및 요소", id:"2022-1회 06번", q:"베어링 합금의 구비조건으로 틀린 것은?", options:["녹아 붙지 않아야 한다.","열전도율이 커야 한다.","내식성이 있고, 충분한 인성이 있어야 한다.","마찰계수가 크고, 내압력이 작아야 한다."], answer:4, explain:"베어링 합금은 하중에 견딜 수 있는 경도와 인성, 내압력을 가져야 하며 마찰계수는 작아야 합니다. 또한 소착(녹아 붙음)에 대한 저항력이 커야 합니다."},
{ part:"기계재료 및 요소", id:"2022-1회 08번", q:"알루미늄(Al) 특성에 관한 설명으로 틀린 것은?", options:["내식성이 우수하다.","합금이 어려운 재료의 특성이 있다.","압접이나 단점이 비교적 용이하다.","전연성이 우수하고, 복잡한 형상의 제품을 만들기 쉽다."], answer:2, explain:"알루미늄은 다른 금속과 합금이 잘 되어 상온 및 고온 가공이 쉽습니다. 전기 전도율은 구리의 60% 이상이며 내식성이 강한 특징이 있습니다."},
{ part:"기계재료 및 요소", id:"2022-1회 10번", q:"청동에 탈산제인 P를 1% 이하로 첨가하여 용탕의 유동성을 좋게 하고, 합금의 경도와 강도가 증가하며 내마모성과 탄성을 개선시키는 것은?", options:["망간 청동","인 청동","알루미늄 청동","규소 청동"], answer:2, explain:"인 청동은 청동에 인(P)을 0.05~0.5% 첨가하여 강도, 경도, 내마모성을 높인 합금입니다."},
{ part:"기계재료 및 요소", id:"2022-1회 13번", q:"주철의 특성에 대한 설명으로 틀린 것은?", options:["주조성이 우수하다.","내마모성이 우수하다.","강보다 탄소 함유량이 적다.","인장강도보다 압축강도가 크다."], answer:3, explain:"주철은 강(탄소량 2.11% 이하)보다 탄소 함유량이 많으며(2.11~6.67%), 마찰 저항이 우수하고 압축강도가 인장강도보다 큽니다."},
{ part:"기계재료 및 요소", id:"2022-1회 14번", q:"철강을 열처리하는 목적에 해당하지 않는 것은?", options:["일반적으로 조직을 미세화시킨다.","내부 응력을 증가시킨다.","표면을 경화시킨다.","기계적 성질을 향상시킨다."], answer:2, explain:"열처리의 목적은 내부 응력 제거 및 감소, 조직 미세화, 기계적 성질 향상 등입니다. 응력을 증가시키는 것은 목적이 아닙니다."},
{ part:"기계재료 및 요소", id:"2022-1회 15번", q:"열가소성 수지가 아닌 것은?", options:["멜라민 수지","폴리에틸렌 수지","초산비닐 수지","폴리염화비닐 수지"], answer:1, explain:"멜라민 수지는 페놀 수지, 에폭시 수지 등과 함께 열경화성 수지에 해당합니다."},
{ part:"기계재료 및 요소", id:"2022-1회 33번", q:"다음 보기에서 설명하는 공구재료는? <보기: 산화알루미늄 분말에 규소 및 마그네슘 등의 산화물과 다른 원소를 첨가하여 소결한 것. 고온경도가 높고 내마모성이 좋으며 충격에는 약하다.>", options:["탄소 공구강","초경합금","다이아몬드","세라믹"], answer:4, explain:"세라믹 공구는 산화알루미늄(Al \n2\n\u200b\nO\n3\n )이 주성분이며, 고온 경도가 매우 높지만 충격에 약한 특징이 있습니다."},

{ part:"기계제도", id:"2022-1회 16번", q:"기계제도 도면에 사용되는 가는 실선의 용도로 틀린 것은?", options:["치수보조선","치수선","지시선","피치선"], answer:4, explain:"가는 실선은 치수선, 치수보조선, 지시선, 해칭선 등에 사용되며, 피치선은 가는 1점 쇄선을 사용합니다."},
{ part:"기계제도", id:"2022-1회 17번", q:"실제 길이가 50mm인 것을 1:2로 축척하여 그린 도면에서 치수 기입은 얼마로 해야 하는가?", options:["25","50","100","150"], answer:2, explain:"도면에 기입하는 치수는 척도와 관계없이 항상 실제 치수를 기입해야 합니다."},
{ part:"기계제도", id:"2022-1회 18번", q:"30° 사다리꼴나사의 종류를 표시하는 기호는?", options:["Rc","Rp","TW","TM"], answer:4, explain:"미터 사다리꼴나사는 Tr(30°), 인치계 사다리꼴나사는 TW(29°)를 쓰며, ISO 규격에 없는 30° 사다리꼴나사는 TM 기호를 사용합니다."},
{ part:"기계제도", id:"2022-1회 20번", q:"도면의 표현방법 중에서 스머징(Smudging)을 하는 이유는?", options:["물체의 표면이 거친 경우","물체의 표면을 열처리하고자 하는 경우","물체의 단면을 나타내는 경우","물체의 특정 부위를 비파괴검사하고자 하는 경우"], answer:3, explain:"스머징은 절단하지 않은 면과 명확히 구분하기 위해 외형선 내부를 색칠하는 단면 표시 방법입니다."},
{ part:"기계제도", id:"2022-1회 21번", q:"형상공차 중 데이텀 기호가 필요 없는 것은?", options:["경사도","평행도","평면도","직각도"], answer:3, explain:"평면도, 진직도, 진원도, 원통도와 같은 모양 공차는 단독 형체에 적용되므로 데이텀이 필요 없습니다."},
{ part:"기계제도", id:"2022-1회 23번", q:"헐거운 끼워맞춤인 경우 구멍의 최소허용치수에서 축의 최대허용치수를 뺀 값은?", options:["최소틈새","최대틈새","최소죔새","최대죔새"], answer:1, explain:"헐거운 끼워맞춤에서 틈새가 발생하는 경우, 구멍의 최소치수에서 축의 최대치수를 뺀 것이 최소틈새가 됩니다."},
{ part:"기계제도", id:"2022-1회 24번", q:"가공에서 생긴 줄무늬 방향기호의 설명으로 틀린 것은?", options:["= : 가공으로 생긴 컷의 줄무늬 방향이 기호를 기입한 그림의 투상면에 평행","⊥ : 가공으로 생긴 컷의 줄무늬 방향이 기호를 기입한 그림의 투상면에 직각","X : 가공으로 생긴 컷의 줄무늬 방향이 기호를 기입한 그림의 투상면에 경사지고 두 방향으로 교차","M : 가공으로 생긴 컷의 줄무늬가 여러 방향으로 교차 또는 무방향"], answer:4, explain:"M 기호는 여러 방향으로 교차되거나 무방향인 경우(래핑, 슈퍼피니싱 등)에 사용합니다."},

{ part:"기계공작법", id:"2022-1회 28번", q:"아베의 원리에 어긋나는 측정 게이지는?", options:["외측 마이크로미터","버니어 캘리퍼스","다이얼 게이지","나사 마이크로미터"], answer:2, explain:"아베의 원리는 표준자와 피측정물이 동일 선상에 있어야 오차가 적다는 원리인데, 버니어 캘리퍼스는 눈금선이 측정선 상에 있지 않아 이 원리에 어긋납니다."},
{ part:"기계공작법", id:"2022-1회 34번", q:"절삭온도를 측정하는 방법이 아닌 것은?", options:["칩의 색깔에 의한 방법","열전대에 의한 방법","칼로리미터에 의한 방법","방사능에 의한 방법"], answer:4, explain:"절삭온도는 칩의 색깔, 칼로리미터, 열전대, 시온 도료 등을 이용해 측정합니다."},
{ part:"기계공작법", id:"2022-1회 35번", q:"시준기와 망원경을 조합한 것으로 미소 각도를 측정하는 광학적 측정기는?", options:["오토 콜리메이터","사인바","콤비네이션 세트","측정기"], answer:1, explain:"오토 콜리메이터는 평면도, 직각도, 평행도 등 미세한 각도 변화나 흔들림 측정에 사용되는 광학식 측정기입니다."},
{ part:"기계공작법", id:"2022-1회 44번", q:"마이크로미터 사용 시 일반적인 주의사항이 아닌 것은?", options:["측정 시 래칫 스톱은 1회전 반 또는 2회전 돌려 측정력을 가한다.","눈금을 읽을 때는 기선의 수직 위치에서 읽는다.","사용 후에는 각 부분을 깨끗이 닦아 녹이 슬지 않도록 보관한다.","대형 외측 마이크로미터는 실제로 측정하는 자세로 0점 조정을 한다."], answer:3, explain:"사용 후에는 습기나 먼지가 없고 온도 변화가 적은 곳에 보관해야 하며, 정밀도를 유지하기 위해 올바른 자세로 0점 조정을 해야 합니다."},

{ part:"기계공작법", id:"2022-1회 36번", q:"밀링작업의 분할법 종류가 아닌 것은?", options:["직접 분할법","간접 분할법","단식 분할법","차동 분할법"], answer:2, explain:"밀링의 분할법에는 직접 분할법(24구멍 이용), 단식 분할법(분할판 이용), 차동 분할법(기어 이용) 등이 있습니다."},
{ part:"기계공작법", id:"2022-1회 37번", q:"밀링머신에서 절삭량 Q(cm^3/min)를 나타내는 식은?", options:["Q=(b×t×f)/10","Q=(b×t×f)/100","Q=(b×t×f)/1,000","Q=(b×t×f)/10,000"], answer:3, explain:"절삭량 Q는 절삭폭(b), 절삭깊이(t), 이송속도(f)를 곱한 값을 1,000으로 나누어 계산합니다."},
{ part:"기계공작법", id:"2022-1회 39번", q:"밀링머신의 부속품에 해당하는 것은?", options:["면판","방진구","맨드릴","분할대"], answer:4, explain:"분할대, 바이스, 회전 테이블 등은 밀링 부속품이며, 면판, 방진구, 맨드릴 등은 선반 부속품에 해당합니다."},
{ part:"기계공작법", id:"2022-1회 49번", q:"다음 중 수평 밀링머신의 긴 아버(Long Arber)를 사용하는 절삭공구가 아닌 것은?", options:["플레인 커터","T홈 커터","앵귤러 커터","사이드 밀링커터"], answer:2, explain:"T홈 커터는 주로 수직 밀링머신에서 사용되는 공구입니다."},
{ part:"기계공작법", id:"2022-1회 59번", q:"범용 밀링에서 원주를 10°30' 분할할 때 맞는 것은?", options:["분할판 15구멍열에서 1회전과 3구멍씩 이동","분할판 18구멍열에서 1회전과 3구멍씩 이동","분할판 21구멍열에서 1회전과 4구멍씩 이동","분할판 33구멍열에서 1회전과 4구멍씩 이동"], answer:2, explain:"각도 분할 공식에 따라 10°30'(10.5°)를 대입하면 18구멍열에서 1회전하고 3구멍을 더 이동하면 분할이 가능합니다."},
{ part:"기계공작법", id:"2022-1회 60번", q:"커터의 지름이 100mm이고, 커터의 날수가 10개인 정면 밀링커터로 길이 300mm의 가공물을 절삭할 때 가공시간은? (단, 절삭속도 100m/min, 1날당 이송은 0.1mm로 한다)", options:["1분","1분 15초","1분 30초","1분 45초"], answer:2, explain:"가공시간 T=L/f 공식을 사용하며, 테이블 이송거리(300+100=400mm)와 이송속도를 계산하면 약 1분 15초(75초)가 소요됩니다."},

{ part:"CNC 밀링", id:"2022-1회 43번", q:"머시닝센터에서 공구를 교환할 때 자동공구 교환 위치인 제2원점으로 복귀할 때 사용되는 G코드는?", options:["G27","G28","G29","G30"], answer:4, explain:"G30은 제2원점 복귀, G28은 자동 원점 복귀 기능을 수행합니다."},
{ part:"CNC 밀링", id:"2022-1회 45번", q:"CNC 공작기계의 일반적인 특징이 아닌 것은?", options:["제품의 균일성을 유지할 수 있다.","작업자의 피로를 줄일 수 있다.","특수공구가 많이 들어간다.","생산성을 향상시킬 수 있다."], answer:3, explain:"CNC 공작기계는 범용 공작기계에 비해 특수공구가 많이 필요하지 않으며, 작업 생산성과 정밀도를 높일 수 있습니다."},
{ part:"CNC 밀링", id:"2022-1회 46번", q:"다음은 머시닝센터의 고정 사이클 프로그램이다. 내용 설명으로 맞는 것은? <G90 G83 G98 Z-25. R3. Q6. F100. M008;>", options:["R3 : 일감의 절삭 깊이","G98 : 공구의 이송속도","G83 : 초기점 복귀 동작","Q6 : 일감의 1회 절삭 깊이"], answer:4, explain:"G83은 심공 드릴 사이클이며, Q는 1회 절입량을 의미합니다. G98은 초기점 복귀 기능을 수행합니다."},
{ part:"CNC 밀링", id:"2022-1회 47번", q:"머시닝센터 조작판에서 새로운 프로그램을 작성하고 편집할 때 선택하는 모드는?", options:["MDI(반자동)","AUTO(자동)","EDIT(편집)","MPG(수동펄스발생기)"], answer:3, explain:"EDIT 모드는 프로그램의 삽입, 수정, 삭제 등 편집을 할 때 사용합니다."},
{ part:"CNC 밀링", id:"2022-1회 48번", q:"NC 기계의 움직임을 전기적 신호로 표시하는 회전 피드백 장치는?", options:["리졸버(Resolver)","서보모터(Servo Moter)","컨트롤러(Controller)","지령 테이프(NC Tape)"], answer:1, explain:"리졸버는 NC 기계의 회전 운동을 전기적 신호로 변환하여 속도와 위치를 피드백하는 장치입니다."},
{ part:"CNC 밀링", id:"2022-1회 52번", q:"머시닝센터의 공구 길이 보정과 관련이 없는 것은?", options:["G40","G43","G44","G49"], answer:1, explain:"G40은 공구 지름 보정 취소이며, 공구 길이 보정은 G43, G44, G49(취소)를 사용합니다."},
{ part:"CNC 밀링", id:"2022-1회 53번", q:"CAD/CAM 시스템의 입력장치에 해당하는 것은?", options:["스캐너","플로터","프린터","모니터(CRT)"], answer:1, explain:"스캐너, 마우스 등은 입력장치이며 플로터, 프린터, 모니터 등은 출력장치입니다."},
{ part:"CNC 밀링", id:"2022-1회 55번", q:"여러 대의 CNC 공작기계를 한 대의 컴퓨터에 연결해 데이터를 분배하여 동시에 운전할 수 있는 방식은?", options:["NC","CNC","DNC","CAD"], answer:3, explain:"DNC(Distributed Numerical Control)는 중앙 컴퓨터가 여러 대의 기계를 제어하는 시스템입니다."},
{ part:"CNC 밀링", id:"2022-1회 57번", q:"CNC 공작기계가 한 번의 동작을 하는 데 필요한 정보가 담겨있는 지령 단위는?", options:["어드레스(Address)","데이터(Data)","블록(Block)","프로그램(Program)"], answer:3, explain:"한 개의 지령 단위를 블록(Block)이라 하며, 기계가 한 번의 동작을 수행하게 합니다."},

{ part:"기계재료 및 요소", id:"2022-1회 05번", q:"피치 × 나사의 줄 수 = ( )의 공식에서 ( ) 안에 들어갈 용어는?", options:["리드","유효지름","호칭","지름피치"], answer:1, explain:"리드(L)는 나사가 1회전 할 때 축 방향으로 이동하는 거리이며, 리드 = 줄 수(n) × 피치(p)입니다."},
{ part:"기계재료 및 요소", id:"2022-1회 07번", q:"핀의 용도에 대한 설명으로 틀린 것은?", options:["2개 이상의 부품을 결합하는 데 사용한다.","나사 및 너트의 이완을 방지한다.","분해 조립할 부품의 위치를 결정한다.","핸들을 축에 고정하는 등 큰 힘이 걸리는 부품을 설치할 때 사용한다."], answer:4, explain:"핀은 주로 큰 힘이 걸리지 않는 부품의 고정이나 위치 결정, 나사 이완 방지에 쓰입니다."},
{ part:"기계공작법", id:"2022-1회 09번", q:"평벨트의 이음방법 중 이음효율이 가장 좋은 것은?", options:["이음쇠 이음","가죽끈 이음","철사 이음","접착제 이음"], answer:4, explain:"접착제 이음의 효율은 75~90%로 가장 높으며, 가죽끈이나 철사 이음보다 우수합니다."},
{ part:"기계재료 및 요소", id:"2022-1회 11번", q:"동력 전달을 직접전동법과 간접전동법으로 구분할 때 직접전동으로 분류되는 것은?", options:["체인 전동","벨트 전동","마찰차 전동","로프 전동"], answer:3, explain:"마찰차나 기어 등은 직접 전동이며, 벨트, 체인, 로프 등은 유연한 매개체를 이용한 간접 전동입니다."},
{ part:"기계재료 및 요소", id:"2022-1회 12번", q:"브레이크의 용량을 결정하는 인자와 관계가 먼 것은?", options:["브레이크의 형상","브레이크 압력","마찰계수","드럼의 원주속도"], answer:1, explain:"브레이크 용량은 브레이크 압력, 마찰계수, 드럼의 원주속도 등에 의해 결정됩니다."},
{ part:"기계공작법", id:"2022-1회 25번", q:"공작물 통과방식 센터리스 연삭의 특징으로 틀린 것은?", options:["긴 홈이 있는 공작물은 연삭할 수 없다.","가늘고 긴 공작물은 연삭할 수 없다.","공작물의 지름이 크거나 무거운 경우 연삭이 어렵다.","연속가공이 가능하며 대량 생산에 적합하다."], answer:2, explain:"센터리스 연삭은 가늘고 긴 공작물의 연삭에 적합하며 연속 가공을 통한 대량 생산에 유리합니다."},
{ part:"기계공작법", id:"2022-1회 26번", q:"기어의 도시법으로 옳은 것은?", options:["잇봉우리원 : 굵은 실선","피치원 : 가는 2점쇄선","이골원 : 가는 1점쇄선","잇줄 방향 : 파단선"], answer:1, explain:"기어 도시 시 잇봉우리원은 굵은 실선, 피치원은 가는 1점쇄선, 이골원은 가는 실선으로 그립니다."},
{ part:"기계공작법", id:"2022-1회 27번", q:"다음 중 래핑(Lapping)에 대한 설명으로 틀린 것은?", options:["가공면은 윤활성 및 내마모성이 좋다.","랩은 원칙적으로 가공물의 경도보다 재질이 강한 것을 사용한다.","게이지 블록, 한계 게이지 등의 게이지류 가공에 이용된다.","일반적인 작업방법은 습식 가공 후 건식 가공을 한다."], answer:2, explain:"랩은 가공물보다 연한 재질(주철, 동합금 등)을 사용하며, 정밀도가 높고 매끈한 거울면을 얻을 수 있습니다."},
{ part:"기계공작법", id:"2022-1회 30번", q:"연삭숫돌에 'WA·46·L·6·V'라고 표시되어 있다면 L이 의미하는 것은?", options:["결합도","결합제","조직","입자"], answer:1, explain:"순서대로 WA(입자), 46(입도), L(결합도), 6(조직), V(결합제)를 의미합니다."},
{ part:"기계공작법", id:"2022-1회 31번", q:"선반에서 바이트의 윗면 경사각에 대한 일반적인 설명으로 틀린 것은?", options:["경사각이 크면 절삭성이 양호하다.","단단한 피삭재는 경사각을 크게 한다.","경사각이 크면 가공 표면거칠기가 양호하다.","경사각이 크면 인선강도가 약해진다."], answer:2, explain:"단단한 피삭재는 인선 강도를 위해 경사각을 작게 해야 합니다."},
{ part:"기계공작법", id:"2022-1회 32번", q:"선반 인서트 팁(Insert Tip)에서 칩을 인위적으로 짧게 끊어지도록 하는 것은?", options:["윗면 경사각","여유각","구성인선","칩브레이커"], answer:4, explain:"칩브레이커는 길게 이어지는 유동형 칩을 짧게 끊어주어 작업자의 안전을 돕는 장치입니다."},
{ part:"기계공작법", id:"2022-1회 38번", q:"절삭공구인선의 파손원인 중 절삭공구의 측면과 피삭재 가공면과의 마찰에 의하여 발생하는 것은?", options:["크레이터 마모","플랭크 마모","치핑","백래시"], answer:2, explain:"플랭크 마모는 공구의 여유면(측면)과 가공면의 마찰로 인해 평행하게 마모되는 현상입니다."},
{ part:"기계공작법", id:"2022-1회 40번", q:"공구가 회전운동과 직선운동을 함께하면서 절삭하는 공작기계는?", options:["선반","세이퍼","브로칭 머신","드릴링 머신"], answer:4, explain:"드릴링 머신은 드릴의 회전 운동과 축 방향의 직선 이송 운동을 동시에 하여 구멍을 뚫습니다."},
{ part:"기계공작법", id:"2022-1회 41번", q:"드릴을 시닝(Thinning)하는 주된 목적은?", options:["절삭저항을 증대시킨다.","날의 강도를 보강해 준다.","절삭효율을 증대시킨다.","드릴의 굽힘을 증대시킨다."], answer:3, explain:"시닝은 드릴 끝 부분의 무딘 웨브를 연삭하여 절삭 저항을 줄이고 효율을 높이는 작업입니다."},
{ part:"기계공작법", id:"2022-1회 42번", q:"재질이 연한 금속의 공작물을 가공할 때 칩의 일부가 칼날 앞에 달라붙어 절삭날과 같은 작용을 하면서 공작물을 절삭하는 것은?", options:["빌트업에지","가공경화","재료의 소성 가공성","청열 메짐"], answer:1, explain:"빌트업에지(구성인선)는 연한 금속 가공 시 칩의 일부가 공구 인선에 압착되어 발생하는 현상입니다."},
{ part:"기계재료 및 요소", id:"2022-1회 50번", q:"테이퍼 핀의 호칭 치수는?", options:["굵은 쪽의 지름","가는 쪽의 지름","중앙부의 지름","테이퍼 핀 구멍의 지름"], answer:2, explain:"테이퍼 핀은 작은 쪽(가는 쪽)의 지름을 호칭 치수로 사용합니다."},

{ part:"안전규정준수", id:"2022-1회 54번", q:"CNC 기계의 일상 점검 중 매일 점검해야 할 사항은?", options:["유량 점검","각부의 필터(Filter) 점검","기계 정도 점검","기계 레벨(수평) 점검"], answer:1, explain:"유량 점검, 압력 점검, 외관 및 작동 검사 등은 매일 점검 사항에 해당합니다."},
{ part:"안전규정준수", id:"2022-1회 56번", q:"CNC 작업 중 기계에 이상이 발생하였을 때 조치사항으로 적당하지 않은 것은?", options:["알람내용을 확인한다.","경보등이 점등되었는지 확인한다.","간단한 내용은 조작설명서에 따라 조치하고 안 되면 전문가에게 의뢰한다.","기계가가공이 안 되기 때문에 무조건 전원을 끈다."], answer:4, explain:"기계 이상 시 무조건 전원을 끄는 것은 적절한 조치가 아니며, 알람 확인과 설명서에 따른 조치가 필요합니다."},// ====== 추가 데이터 시작 ======
{ part:"기계재료 및 요소", id:"2021-2회 01번", q:"Cu 3.54.5%, Mg 11.5%, Si 0.5~1.0%, 나머지는 Al인 합금으로 무게를 중요시하는 항공기나 자동차에 사용되는 고강도 알루미미늄 합금은?", options:["두랄루민","하이드로날륨","알드레이","내식 알루미늄"], answer:1, explain:"두랄루민은 단조용 알루미늄 합금으로 가벼워서 항공기나 자동차 등에 사용되는 고강도 알루미늄 합금(Al−Cu−Mg−Mn)입니다." },
{ part:"기계재료 및 요소", id:"2021-2회 02번", q:"니켈-크롬강에서 나타나는 뜨임취성을 방지하기 위해 첨가하는 원소는?", options:["크롬(Cr)","탄소(C)","몰리브덴(Mo)","인(P)"], answer:3, explain:"Ni−Cr강에 나타나는 뜨임취성은 소량의 몰리브덴(Mo)을 첨가하여 방지할 수 있습니다." },
{ part:"기계재료 및 요소", id:"2021-2회 03번", q:"Cu에 60~70%의 Ni 함유량을 첨가한 Ni-Cu계의 합금이며, 내식성이 좋아 화학공업용 재료로 많이 쓰이는 것은?", options:["Y합금","니크롬","모넬메탈","콘스탄탄"], answer:3, explain:"모넬메탈은 Cu에 60~70%의 Ni 함유량을 첨가한 Ni−Cu계 합금으로 내식성이 좋아 화학공업용 재료로 널리 사용됩니다." },
{ part:"기계재료 및 요소", id:"2021-2회 04번", q:"상온취성(Cold Shortness)의 주된 원인이 되는 물질로 가장 적합한 것은?", options:["탄소(C)","규소(Si)","인(P)","황(S)"], answer:3, explain:"인(P)을 많이 함유한 재료는 상온에서 충격값이 현저히 낮고 취성이 있는 상온취성 현상이 나타납니다." },
{ part:"기계재료 및 요소", id:"2021-2회 05번", q:"강과 비교한 주철의 특성이 아닌 것은?", options:["주조성이 우수하다.","복잡한 형상을 생산할 수 있다.","주물제품을 값싸게 생산할 수 있다.","강에 비해 강도가 비교적 높다."], answer:4, explain:"주철은 강에 비해 강도 및 인장강도가 낮고 취성이 큰 단점이 있습니다." },
{ part:"기계재료 및 요소", id:"2021-2회 06번", q:"황(S)이 적은 선철을 용해하여 주입 전에 Mg, Ce, Ca 등을 첨가하여 제조한 주철은?", options:["펄라이트 주철","구상흑연주철","가단주철","강력주철"], answer:2, explain:"구상흑연주철은 주조 상태의 주철 중에 마그네슘(Mg), 세륨(Ce) 등을 첨가하여 흑연을 구상화한 것입니다." },
{ part:"기계재료 및 요소", id:"2021-2회 07번", q:"강의 표면경화법으로 금속 표면에 탄소(C)를 침입 고용시키는 방법은?", options:["질화법","침탄법","화염경화법","쇼트피닝"], answer:2, explain:"침탄법은 금속 표면에 탄소(C)를 침입 고용시켜 표면을 경화시키는 방법입니다." },

{ part:"기계제도", id:"2021-2회 16번", q:"치수 숫자와 함께 사용되는 기호로 45° 모따기를 나타내는 기호는?", options:["C","R","K","M"], answer:1, explain:"45° 모따기를 나타낼 때는 치수 수치 앞에 기호 'C'를 붙입니다." },
{ part:"기계제도", id:"2021-2회 17번", q:"바퀴의 암(Arm)이나 리브(Rib)의 단면 실형을 회전도시단면도로 도형 내에 그릴 경우 사용하는 선의 종류는?", options:["가는 실선","굵은 실선","가상선","절단면"], answer:1, explain:"도형 내에 그릴 경우에는 가는 실선을 사용하고, 투상도 밖으로 끌어내어 그릴 경우에는 굵은 실선을 사용합니다." },
{ part:"기계제도", id:"2021-2회 18번", q:"나사의 호칭이 'L 2줄 M50 × 2－6H'로 표시된 나사에서 6H가 표시하는 것은?", options:["줄 수","암나사의 등급","피치","나사 방향"], answer:2, explain:"'6H'는 암나사의 공차 등급을 의미합니다. (대문자는 암나사, 소문자는 수나사)" },
{ part:"기계제도", id:"2021-2회 20번", q:"기계제도에서 굵은 1점쇄선을 사용하는 경우로 가장 적합한 것은?", options:["대상물의 보이는 부분의 겉모양을 표시하기 위하여 사용한다.","치수를 기입하기 위하여 사용한다.","도형의 중심을 표시하는 데 쓰인다.","특수한 가공 부위를 표시하기 위하여 사용한다."], answer:4, explain:"굵은 1점쇄선은 특수한 가공이나 열처리가 필요한 부분 등 특별한 요구사항을 적용할 범위를 표시할 때 사용합니다." },
{ part:"기계제도", id:"2021-2회 23번", q:"기계제도에서 도형 생략에 관한 설명으로 틀린 것은?", options:["대칭도형을 생략할 경우 대칭중심선의 한쪽 도형만 그리고, 그 대칭중심선의 양쪽 부분에 가는 선으로 동그라미(대칭기호)를 그린다.","대칭도형을 생략할 경우 대칭중심선의 한쪽 도형을 대칭중심선을 조금 넘은 부분까지 그릴 수 있다.","반복도형을 생략하는 경우 심형 대신 그림기호를 피치선과 중심선의 교점에 기입한다.","중간 부분을 생략할 경우 생략된 중간 부분을 파단선으로 나타내서 생략할 수 있다."], answer:1, explain:"대칭도형의 생략 시 대칭중심선의 양 끝부분에 짧은 2개의 나란한 가는 실선을 그려야 합니다." },
{ part:"기계제도", id:"2021-2회 24번", q:"표면의 줄무늬 방향기호에 대한 설명으로 맞는 것은?", options:["X : 가공에 의한 컷의 줄무늬 방향이 투상면에 직각","M : 가공에 의한 컷의 줄무늬 방향이 투상면에 평행","C : 가공에 의한 컷의 줄무늬 방향이 중심에 동심원 모양","R : 가공에 의한 컷의 줄무늬 방향이 투상면에 교차 또는 경사"], answer:3, explain:"'C'는 가공에 의한 컷의 줄무늬가 기호를 기입한 면의 중심에 대하여 대략 동심원 모양인 것을 나타냅니다." },

{ part:"기계공작법", id:"2021-2회 29번", q:"일반적으로 절삭온도를 측정하는 방법이 아닌 것은?", options:["칩의 색깔에 의한 방법","열전대에 의한 방법","칼로리미터에 의한 방법","방사능에 의한 방법"], answer:4, explain:"절삭온도 측정법에는 칩의 색깔, 칼로리미터, 열전대 삽입, 시온 도료, 복사 고온계 등이 있습니다." },
{ part:"기계공작법", id:"2021-2회 37번", q:"수기가공 시 금긋기용 공구에 해당되지 않는 것은?", options:["V-블록","서피스 게이지","직각자","스크레이퍼"], answer:4, explain:"스크레이퍼(Scraper)는 금속 표면을 깎아 정밀하게 다듬질하는 가공 공구입니다." },
{ part:"기계공작법", id:"2021-2회 58번", q:"다음 측정기기의 명칭 중 각도 측정에 사용되는 것은?", options:["스트레이트 에지","마이크로미터","사인바","버니어 캘리퍼스"], answer:3, explain:"사인바(Sine Bar)는 길이를 측정하여 삼각함수 계산으로 임의의 각도를 측정하거나 설정하는 기구입니다." },
{ part:"기계공작법", id:"2021-2회 59번", q:"일반적인 버니어 캘리퍼스로 측정할 수 없는 것은?", options:["나사의 유효지름","지름이 30mm인 둥근 봉의 바깥지름","안지름이 35mm인 파이프의 안지름","두께가 10mm인 철판의 두께"], answer:1, explain:"나사의 유효지름 측정은 나사 마이크로미터, 삼침법, 광학적 방법 등을 사용해야 합니다." },

{ part:"기계공작법", id:"2021-2회 28번", q:"절삭유를 사용하는 목적으로 거리가 먼 것은?", options:["공구 상면과 칩 사이의 마찰 감소","공구 가공물을 냉각시켜 열에 의한 정밀도 저하 방지","구성인선의 발생을 촉진하여 표면거칠기를 향상","칩을 씻어 주어 절삭을 원활하게 함"], answer:3, explain:"절삭유는 구성인선의 발생을 억제하여 가공면의 표면거칠기를 좋게 합니다." },
{ part:"기계공작법", id:"2021-2회 44번", q:"연성재료를 저속으로 절삭할 때, 절삭 깊이가 클 때 발생하며 칩의 두께가 수시로 변하게 되어 진동이 발생하기 쉽고 표면거칠기도 나빠지는 칩의 형태는?", options:["전단형 칩","경작형 칩","유동형 칩","균열형 칩"], answer:1, explain:"전단형 칩은 연성재료를 저속 절삭할 때 주로 발생하며 진동이 생기고 표면거칠기가 나빠집니다." },
{ part:"기계공작법", id:"2021-2회 45번", q:"절삭가공을 할 때 열이 발생하는 이유와 가장 관계가 적은 것은?", options:["칩과 공구의 경사면이 마찰할 때","공구의 여유면을 따라 칩이 일어날 때","전단면에서 전단 소성 변형이 일어날 때","공구 여유면과 공작물 표면이 마찰할 때"], answer:2, explain:"절삭열은 주로 전단면의 소성 변형과 칩-공구 마찰, 공구-공작물 마찰에 의해 발생합니다." },

{ part:"CNC 밀링", id:"2021-2회 46번", q:"1.5초 동안 일시정지(G04) 기능의 명령으로 틀린 것은?", options:["G04 U1.5;","G04 X1.5;","G04 P1.5;","G04 P1500;"], answer:3, explain:"어드레스 P를 사용하여 휴지(Dwell) 시간을 지령할 때는 소수점을 사용할 수 없습니다." },
{ part:"CNC 밀링", id:"2021-2회 48번", q:"복합형 고정 사이클 G76 코드를 이용하여 'M30 × 1.5' 2줄 나사 가공 시 F에 들어갈 적합한 내용은?", options:["F1.0","F1.5","F2.0","F3.0"], answer:4, explain:"나사의 리드(L) = 피치(p) × 줄 수(n) = 1.5×2=3.0입니다." },
{ part:"CNC 밀링", id:"2021-2회 50번", q:"컴퓨터에 의한 통합 생산시스템으로 설계, 제조, 생산, 관리 등을 통합하여 운영하는 시스템은?", options:["CAM","FMS","DNC","CIMS"], answer:4, explain:"CIMS(Computer Integrated Manufacturing System)는 컴퓨터를 이용해 제조 전 과정을 통합 운영하는 시스템입니다." },
{ part:"CNC 밀링", id:"2021-2회 51번", q:"머시닝센터 작업에서 같은 지름의 구멍이 동일 평면상에 여러 개 있을 때 공구를 R점 복귀 후 이동하여 가공하는 것은?", options:["G99","G49","G97","G96"], answer:1, explain:"G99는 고정 사이클에서 가공 후 R점(참조점)으로 복귀하는 지령입니다." },
{ part:"CNC 밀링", id:"2021-2회 52번", q:"머시닝센터 가공용 CNC 프로그램에서 G80의 의미는?", options:["공구경 보정 취소","고정 사이클 취소","공구 길이 보정 취소","위치결정 취소"], answer:2, explain:"G80은 사용 중인 모든 고정 사이클을 취소하는 준비기능입니다." },
{ part:"CNC 밀링", id:"2021-2회 53번", q:"공구 길이 보정 프로그램의 빈칸에 알맞은 것은? (G90 G00 G43 Z100. ____;)", options:["D01","H01","S01","M01"], answer:2, explain:"G43(길이 보정 +) 지령 시 공구 길이 보정번호인 H를 함께 사용합니다." },
{ part:"CNC 밀링", id:"2021-2회 55번", q:"다음은 머시닝센터의 고정 사이클 프로그램이다. 내용 설명으로 맞는 것은? (G90 G83 G98 Z-25. R3. Q6. F100. M008;)", options:["R3 : 일감의 절삭 깊이","G98 : 공구의 이송속도","G83 : 초기점 복귀 동작","Q6 : 일감의 1회 절삭 깊이"], answer:4, explain:"G83은 심공 드릴 사이클이며, Q는 1회 절입량을 의미합니다." },
{ part:"CNC 밀링", id:"2021-2회 56번", q:"머시닝센터 프로그램의 일부에서 ( ) 안에 들어갈 주소와 값으로 옳은 것은? (G90 G92 X0. Y0. Z100.; ( ⓐ )1500 M03;)", options:["F","S","H","D"], answer:2, explain:"1,500rpm 정회전 명령이므로 주축 회전수 지령인 S1500이 들어가야 합니다." },
{ part:"CNC 밀링", id:"2021-2회 57번", q:"CNC 선반 조작판에서 새로운 프로그램을 작성하고 메모리에 등록된 프로그램을 편집(삽입, 수정, 삭제)할 때 선택하는 모드는?", options:["MDI(반자동)","AUTO(자동)","EDIT(편집)","MPG(수동펄스발생기)"], answer:3, explain:"EDIT 모드는 프로그램을 신규 작성하거나 기존 프로그램을 수정, 삭제할 때 사용합니다." },
{ part:"CNC 밀링", id:"2021-2회 60번", q:"머시닝센터 프로그램에서 G73, G83 코드에서 매회 절입량을 지정하는 어드레스는?", options:["R","O","Q","P"], answer:3, explain:"Q는 고정 사이클(G73, G83 등)에서 1회 절입량 또는 시프트량을 지정하는 주소입니다." },

{ part:"기계재료 및 요소", id:"2021-2회 08번", q:"비틀림 각이 30°인 헬리컬기어에서 잇수가 40이고, 축 직각 모듈이 4일 때 피치원 지름은 약 몇 mm인가?", options:["160","170.27","158","184.75"], answer:4, explain:"D= cosβ/mZ = cos30° 4×40 ≈184.75mm입니다." },
{ part:"기계재료 및 요소", id:"2021-2회 11번", q:"미터나사에 대한 설명으로 옳은 것은?", options:["나사산의 각도는 60°이다.","ABC 나사라고도 한다.","운동용 나사이다.","피치는 1인치당 나사산의 수로 나타낸다."], answer:1, explain:"미터나사는 나사산의 각도가 60°인 미터계 삼각나사입니다." },
{ part:"기계재료 및 요소", id:"2021-2회 12번", q:"가공재료의 단면에 수직 방향으로 작용하는 하중은?", options:["전단하중","굽힘하중","인장하중","비틀림하중"], answer:3, explain:"인장하중은 재료의 축 방향(단면에 수직)으로 늘어나게 하려는 하중입니다." },
{ part:"기계재료 및 요소", id:"2021-2회 13번", q:"볼 베어링에서 볼을 적당한 간격으로 유지시켜 주는 베어링 부품은?", options:["리테이너","레이스","하우징","부시"], answer:1, explain:"리테이너(Retainer)는 베어링 볼의 간격을 일정하게 유지해 주는 부품입니다." },
{ part:"기계재료 및 요소", id:"2021-2회 14번", q:"직선운동을 회전운동으로 변환하거나 회전운동을 직선운동으로 변환하는 데 사용되는 기어는?", options:["스퍼기어","베벨기어","헬리컬기어","래크와 피니언"], answer:4, explain:"래크와 피니언은 회전운동을 직선운동으로 바꾸는 데 사용됩니다." },
{ part:"기계재료 및 요소", id:"2021-2회 15번", q:"단면적이 100mm²인 강재에 300N의 전단하중이 작용할 때 전단응력(N/mm²)은?", options:["1","2","3","4"], answer:3, explain:"전단응력(τ) = 전단하중(P) / 단면적(A) = 300/100=3N/mm² 입니다." },
{ part:"기계공작법", id:"2021-2회 27번", q:"특정 제품을 대량 생산할 때 적합한 공작기계로서 소량 생산에는 적합하지 않고, 구조가 간단하고 조작이 편리한 공작기계는?", options:["만능공작기계","단능공작기계","전용공작기계","범용공작기계"], answer:3, explain:"전용 공작기계(트랜스퍼 머신 등)는 특정한 모양이나 치수의 제품을 대량 생산하기 위해 설계된 기계입니다." },
{ part:"기계공작법", id:"2021-2회 30번", q:"불수용성 절삭유로서 광물성유에 속하지 않는 것은?", options:["스핀들유","기계유","올리브유","경유"], answer:3, explain:"올리브유는 식물성유에 해당합니다." },
{ part:"기계공작법", id:"2021-2회 31번", q:"마찰면이 넓은 부분에 사용되며 저속 및 중속축의 급유에 사용되는 급유방법은?", options:["적하 급유법","패드 급유법","유욕 급유법","강제 급유법"], answer:2, explain:"패드 급유법은 모직이나 털 등을 섞어 만든 패드 일부를 오일통에 담가 모세관 현상을 이용해 급유하는 방법입니다." },
{ part:"기계공작법", id:"2021-2회 33번", q:"연삭숫돌의 입도를 선택하는 조건으로 적합하지 않은 것은?", options:["거칠게 연삭할 때는 거친 입도","접촉면이 클 때는 거친 입도","경도가 높은 일감에는 거친 입도","연성재료에는 거친 입도"], answer:3, explain:"경도가 높고 취성이 큰 공작물을 연삭할 때는 일반적으로 고운 입도를 선택합니다." },
{ part:"기계공작법", id:"2021-2회 34번", q:"브로칭머신으로 가공할 수 없는 것은?", options:["스플라인 홈","다각형의 구멍","등근 구멍 안의 키 홈","베어링용 볼"], answer:4, explain:"베어링용 볼은 브로칭 머신으로 가공할 수 없습니다." },
{ part:"기계공작법", id:"2021-2회 35번", q:"일반적으로 바이스의 크기를 나타내는 것은?", options:["바이스 전체의 중량","물건을 물릴 수 있는 조의 폭","물건을 물릴 수 있는 최대 거리","바이스의 최대 높이"], answer:2, explain:"바이스의 크기는 공작물을 물리는 조(Jaw)의 폭으로 나타냅니다." },
{ part:"기계공작법", id:"2021-2회 38번", q:"드릴(Drill)에 대한 설명으로 맞는 것은?", options:["웨브는 드릴 끝쪽으로 갈수록 두꺼워진다.","드릴의 외경은 자루쪽으로 갈수록 커진다.","표준 드릴의 날끝각은 100°이다.","Ø13mm 이상의 드릴은 슬리브나 소켓에 끼워 사용한다."], answer:4, explain:"지름 13mm 이상의 드릴 자루는 테이퍼져 있어 슬리브나 소켓에 끼워 사용합니다." },
{ part:"기계공작법", id:"2021-2회 39번", q:"표면을 매끈하게 다듬은 공구를 일감 구멍에 압입하여 구멍 내면을 매끈하게 다듬는 방법은?", options:["버핑","블라스팅","버니싱","텀블링"], answer:3, explain:"버니싱(Burnishing)은 원통형 내면에 강철 볼 등의 공구를 압입 통과시켜 매끈하고 정밀한 면을 얻는 방법입니다." },
{ part:"기계공작법", id:"2021-2회 41번", q:"'WA 46 K m V'로 표시된 숫돌에서 결합제를 의미하는 기호는?", options:["WA","K","m","V"], answer:4, explain:"마지막의 V는 비트리파이드(Vitrified) 결합제를 의미합니다." },
{ part:"기계공작법", id:"2021-2회 42번", q:"큰 일감을 고정시키고 주축의 드릴 부분을 움직여서 드릴링의 위치를 결정하고 구멍을 뚫는 드릴머신의 종류는?", options:["직립 드릴링머신","탁상 드릴링머신","다축 드릴링머신","레이디얼 드릴링머신"], answer:4, explain:"레이디얼 드릴링머신은 대형 또는 무거운 공작물을 고정해 두고 드릴 헤드를 이동시켜 가공하는 데 적합합니다." },

{ part:"안전규정준수", id:"2021-2회 60번", q:"CNC 작업 중 기계에 이상이 발생하였을 때 조치사항으로 적당하지 않은 것은?", options:["알람내용을 확인한다.","경보등이 점등되었는지 확인한다.","간단한 내용은 조작설명서에 따라 조치하고 안 되면 전문가에게 의뢰한다.","기계가가공이 안 되기 때문에 무조건 전원을 끈다."], answer:4, explain:"무조건 전원을 끄는 것은 적절한 조치사항이 아니며, 먼저 알람 내용을 확인해야 합니다." },// 1. 기계재료
{ part:"기계재료 및 요소", id:"2021-1회 01번", q:"브레이크 재료 사용 시 마찰계수가 가장 큰 것은? (단, 마찰조건은 건조 상태이다)", options:["주철","가죽","연강","석면"], answer:4, explain:"마찰계수가 가장 큰 것은 석면이며, 브레이크 재질로 많이 사용됩니다." },
{ part:"기계재료 및 요소", id:"2021-1회 02번", q:"다이캐스팅 합금으로 요구되는 성질이 아닌 것은?", options:["유동성이 좋을 것","금형에 대한 밀착성이 좋을 것","응고 수축에 대한 용탕 보급성이 좋을 것","열간취성이 작을 것"], answer:2, explain:"다이캐스팅 합금은 금형에 대한 점착성이 나빠야 금형에서 제품이 잘 떨어질 수 있습니다." },
{ part:"기계재료 및 요소", id:"2021-1회 03번", q:"비중이 10.497, 용융점이 960℃인 금속으로 열전도도 및 전기전도도가 양호한 것은?", options:["은(Ag)","구리(Cu)","금(Au)","마그네슘(Mg)"], answer:1, explain:"은(Ag)은 비중 10.497, 용융온도 960.5℃의 특성을 가집니다." },
{ part:"기계재료 및 요소", id:"2021-1회 04번", q:"탄소강을 변태점 이상으로 가열한 후에 수중 담금질 속도를 매우 빠르게 냉각시킬 때 생성되는 조직은?", options:["솔바이트","펄라이트","트루스타이트","마텐자이트"], answer:4, explain:"마텐자이트는 탄소강을 물속에서 담금질할 때 얻어지는 조직으로, 변태 과정 중 냉각 속도가 매우 빠를 때 생성됩니다." },
{ part:"기계재료 및 요소", id:"2021-1회 05번", q:"알루미늄 청동에 관한 설명으로 맞는 것은?", options:["알루미늄 8~12%를 함유하는 구리-알루미늄 합금이다.","구리, 주석 등이 주성분으로 주조, 단조, 용접성이 좋다.","청동에 탄산제로 인을 첨가한 후 알루미늄을 첨가한 것으로 상온에서 α+β 공정조직을 갖고 있다.","자기풀림현상이 없어 딱딱하고 매우 강한 성질로 된다."], answer:1, explain:"알루미늄 청동은 12% 이하의 알루미늄을 함유하는 구리-알루미늄 합금입니다." },
{ part:"기계재료 및 요소", id:"2021-1회 07번", q:"스테인리스강을 조직상으로 분류한 것 중 틀린 것은?", options:["마텐자이트계","오스테나이트계","시멘타이트계","페라이트계"], answer:3, explain:"스테인리스강의 종류에는 페라이트계, 오스테나이트계, 마텐자이트계가 있습니다." },
{ part:"기계재료 및 요소", id:"2021-1회 16번", q:"재료기호가 'SF340A'로 표시되었을 때 이 재료는?", options:["탄소강 단강품","고속도 공구강","합금 공구강","소결 합금강"], answer:1, explain:"SF340A는 탄소강 단강품이며, 최저 인장강도는 340N/mm²입니다." },

{ part:"기계제도", id:"2021-1회 19번", q:"제도에 있어서 치수 기입 요소가 아닌 것은?", options:["치수선","치수 숫자","가공기호","치수보조선"], answer:3, explain:"치수 기입의 4요소는 치수선, 치수보조선, 지시선, 치수 숫자(화살표 포함)입니다." },
{ part:"기계제도", id:"2021-1회 21번", q:"다음 중 대칭도를 나타내는 기호는?", options:["(위치도 기호)","(평행도 기호)","(원주 흔들림 기호)","≡"], answer:4, explain:"기하공차 기호 중 ≡는 대칭도를 의미합니다." },
{ part:"기계제도", id:"2021-1회 25번", q:"바이트의 끝 모양과 이송이 표면 거칠기에 미치는 영향 중 이론적인 표면거칠기(Hmax)를 구하는 식으로 옳은 것은? (단, r=바이트 끝 반지름, S=이송거리)", options:["Hmax=8r/S","Hmax=S²/8r","Hmax=S/8r","Hmax=8r/S²"], answer:2, explain:"이론적인 표면거칠기 값은 Hmax = S² / 8r 공식으로 계산됩니다." },
{ part:"기계제도", id:"2021-1회 26번", q:"A3 도면의 크기로 맞는 것은?", options:["210×297","297×420","841×1,189","594×841"], answer:2, explain:"A3 도면 규격은 297×420 mm입니다." },
{ part:"기계제도", id:"2021-1회 31번", q:"끼워맞춤 치수공차 기호 중 헐거운 끼워맞춤은?", options:["∅50H7/p6","∅50H7/g6","∅50H7/js6","∅50H7/m6"], answer:2, explain:"H7/g6 조합은 구멍 기준식 헐거운 끼워맞춤에 해당합니다." },

// 3. 측정
{ part:"기계재료 및 요소", id:"2021-1회 10번", q:"베어링의 호칭번호 6203의 안지름 치수는 몇 mm인가?", options:["10","12","15","17"], answer:4, explain:"안지름 번호 '03'은 17mm를 의미합니다. (00: 10mm, 01: 12mm, 02: 15mm)" },
{ part:"기계공작법", id:"2021-1회 37번", q:"마이크로미터의 원리에 대한 설명으로 옳은 것은?", options:["어떤 길이의 변화를 나사의 회전각과 지름에 의해 확대시켜 만든 것이다.","어떤 길이의 변화를 롤러 및 게이지 블록을 이용하여 만든 것이다.","어떤 길이의 변화를 기포관 내의 기포 위치를 확대시켜 만든 것이다.","어떤 길이의 변화를 광파장에 의해 확대시켜 만든 것이다."], answer:1, explain:"마이크로미터는 나사의 피치를 이용하여 회전 운동을 직선 운동으로 바꾸고 이를 확대하여 길이를 측정하는 기구입니다." },
{ part:"기계공작법", id:"2021-1회 38번", q:"래핑작업의 장점에 대한 설명으로 틀린 것은?", options:["가공면이 매끈한 거울면을 얻을 수 있다.","정밀도가 높은 제품을 가공할 수 있다.","가공면은 윤활성 및 내마모성이 좋다.","작업이 깨끗하고 먼지가 적다."], answer:4, explain:"래핑은 작업 시 랩제(분말)를 사용하므로 작업장이 지저분해지기 쉽고 먼지가 발생하는 단점이 있습니다." },
{ part:"기계공작법", id:"2021-1회 44번", q:"게이지블록의 모양에 따른 종류가 아닌 것은?", options:["캐리형","요한슨형","호크형","웨이브형"], answer:4, explain:"게이지블록의 모양에 따른 종류는 요한슨형(직사각형), 호크형(중앙 구멍), 캐리형(원형)이 있습니다." },
{ part:"기계공작법", id:"2021-1회 49번", q:"직접 측정의 장점에 해당되지 않는 것은?", options:["측정기의 측정범위가 다른 측정법에 비해 넓다.","측정물의 실제 치수를 직접 읽을 수 있다.","수량이 적고, 종류가 많은 제품 측정에 적합하다.","측정자의 숙련과 경험이 필요 없다."], answer:4, explain:"직접 측정은 눈금을 읽는 사람의 숙련도와 경험에 따라 오차가 발생할 수 있으므로 숙련이 필요합니다." },
{ part:"기계공작법", id:"2021-1회 50번", q:"나사의 유효지름 측정방법에 해당하지 않는 것은?", options:["나사 마이크로미터에 의한 유효지름 측정방법","삼침법에 의한 유효지름 측정방법","공구현미경에 의한 유효지름 측정방법","사인바에 의한 유효지름 측정방법"], answer:4, explain:"사인바는 각도를 측정하는 기구이며, 유효지름 측정에는 나사 마이크로미터, 삼침법, 광학적 방법 등이 사용됩니다." },
{ part:"기계제도", id:"2021-1회 57번", q:"머시닝센터에서 테이블에 고정된 공작물의 높이를 측정하고자 할 때 가장 적당한 것은?", options:["다이얼게이지","한계게이지","하이트게이지","사인바"], answer:3, explain:"하이트게이지는 정반 위에 공작물을 놓고 높이를 측정하거나 스크라이버 끝으로 금긋기 작업을 할 때 사용합니다." },
{ part:"기계공작법", id:"2021-1회 58번", q:"다음 측정기기의 명칭 중 각도 측정에 사용되는 것은?", options:["스트레이트 에지","마이크로미터","사인바","버니어 캘리퍼스"], answer:3, explain:"사인바(Sine Bar)는 길이를 측정하여 삼각함수 계산으로 임의의 각도를 측정하거나 설정하는 기구입니다." },
{ part:"기계공작법", id:"2021-1회 59번", q:"일반적인 버니어 캘리퍼스로 측정할 수 없는 것은?", options:["나사의 유효지름","지름이 30mm인 둥근 봉의 바깥지름","안지름이 35mm인 파이프의 안지름","두께가 10mm인 철판의 두께"], answer:1, explain:"나사의 유효지름은 버니어 캘리퍼스로 측정할 수 없으며 나사 마이크로미터나 삼침법 등을 사용해야 합니다." },

// 4. 밀링가공
{ part:"기계공작법", id:"2021-1회 30번", q:"밀링에서 날 1개당의 이송을 fz=0.01mm, 날수 z=6, 회전수 n=500rpm일 때, 이송속도 f(mm/min)는?", options:["3,000mm/min","1,200mm/min","120mm/min","30mm/min"], answer:4, explain:"테이블 이송속도 f = fz × z × n = 0.01 × 6 × 500 = 30mm/min입니다." },
{ part:"기계공작법", id:"2021-1회 34번", q:"엔드밀로 홈가공 시 절삭력에 의해 휘어지는 문제가 발생하는데, 이 힘의 방지법으로 적합한 것은?", options:["가능한 한 엔드밀을 짧게 고정한다.","절삭량을 많이 준다.","이송속도를 빠르게 한다.","주축 회전수를 빠르게 한다."], answer:1, explain:"엔드밀의 돌출 길이를 짧게 고정하면 강성이 높아져 휘어짐 현상을 줄일 수 있습니다." },
{ part:"기계공작법", id:"2021-1회 45번", q:"밀링작업에서 분할대를 이용하여 직접 분할이 가능한 가장 큰 분할수는?", options:["40","32","24","15"], answer:3, explain:"직접 분할은 분할대 주축 앞면의 24구멍 직접 분할판을 사용하므로, 24의 약수 중 최대값인 24등분이 가능합니다." },
{ part:"기계공작법", id:"2021-1회 46번", q:"외주와 정면에 절삭 날이 있고 주로 수직밀링에서 사용하는 커터로 절삭능력과 가공면의 표면거칠기가 우수한 초경 밀링커터는?", options:["슬래브 밀링커터","총형 밀링커터","더브테일 커터","정면 밀링커터"], answer:4, explain:"정면 밀링커터는 강력 절삭 및 우수한 가공 표면을 얻는 데 적합한 공구입니다." },
{ part:"기계공작법", id:"2021-1회 47번", q:"커터의 지름이 100mm이고, 커터의 날수가 10개인 정면 밀링커터로 길이 300mm의 가공물을 절삭할 때 가공시간은? (단, 절삭속도 100m/min, 1날당 이송은 0.1mm로 한다)", options:["1분","1분 15초","1분 30초","1분 45초"], answer:2, explain:"계산 과정을 거치면 가공시간은 약 75초(1분 15초)가 소요됩니다." },
{ part:"기계공작법", id:"2021-1회 52번", q:"밀링작업에서 T홈 절삭을 하기 위해서 선행해야 할 작업은?", options:["엔드밀 홈 작업","더브테일 홈 작업","나사 밀링커터 작업","총형 밀링커터 작업"], answer:1, explain:"T홈 가공 전에는 먼저 엔드밀을 사용하여 수직 홈을 미리 가공해 두어야 합니다." },

// 5. CNC 밀링
{ part:"기계공작법", id:"2021-1회 36번", q:"다음 선반가공법의 종류로 거리가 먼 것은?", options:["외경 절삭가공","드릴링 가공","총형 절삭가공","더브테일 가공"], answer:4, explain:"더브테일 가공은 밀링머신에서 주로 수행하는 가공 방식입니다." },
{ part:"CNC 밀링", id:"2021-1회 51번", q:"CNC 프로그램의 어드레스(Address)와 그 기능이 틀린 것은?", options:["준비기능 : G","이송기능 : F","주축기능 : S","휴지기능 : T"], answer:4, explain:"휴지(Dwell) 기능에 사용되는 어드레스는 P, X, U이며, T는 공구 기능을 나타냅니다." },
{ part:"CNC 밀링", id:"2021-1회 54번", q:"CNC 공작기계가 한 번의 동작을 하는 데 필요한 정보가 담겨 있는 지령단위는?", options:["어드레스(Address)","데이터(Data)","블록(Block)","프로그램(Program)"], answer:3, explain:"한 개의 지령단위를 블록(Block)이라 하며, 여러 개의 단어가 모여 구성됩니다." },
{ part:"CNC 밀링", id:"2021-1회 55번", q:"CNC 공작기계의 운전 시 일상 점검사항이 아닌 것은?", options:["공구의 파손이나 마모 상태 확인","가공할 재료의 성분 분석","공기압이나 유압 상태 확인","각종 계기의 상태 확인"], answer:2, explain:"재료의 성분 분석은 가공 전 재료 검사 단계이며, 기계 운전 시의 일상 점검 사항은 아닙니다." },
{ part:"CNC 밀링", id:"2021-1회 56번", q:"보조기능을 프로그램을 제어하는 보조기능과 기계 보조장치를 제어하는 보조기능으로 나눌 때 프로그램을 제어하는 보조기능은?", options:["M03","M05","M08","M30"], answer:4, explain:"M30은 프로그램 종료 및 리셋 기능을 수행하는 프로그램 제어용 보조기능입니다." },

// 6. 기타 기계가공
{ part:"기계재료 및 요소", id:"2021-1회 06번", q:"1,600℃ 이상에서 점토를 소결하여 만들어진 공구로, 성분의 대부분은 산화알루미늄으로 절삭 중에는 열을 흡수하지 않아 공구를 과열시키지 않는 고속 정밀가공에 적합한 것은?", options:["탄소 공구강","합금 공구강","고속도강","세라믹 공구강"], answer:4, explain:"세라믹 공구는 산화알루미늄(Al₂O₃) 분말을 주성분으로 하며 고온 경도가 매우 높습니다." },
{ part:"기계재료 및 요소", id:"2021-1회 08번", q:"피치가 2mm인 2줄 나사를 180° 회전시켰을 때 나사가 축 방향으로 움직인 거리는 몇 mm인가?", options:["1","2","3","4"], answer:2, explain:"리드 L=n×p=2×2=4mm. 180°(0.5회전) 회전했으므로 이동 거리는 4×0.5=2mm입니다." },
{ part:"기계재료 및 요소", id:"2021-1회 11번", q:"표준 평기어의 잇수가 48개, 모듈이 4일 때 피치원 지름은 몇 mm인가?", options:["12","100","162","192"], answer:4, explain:"피치원 지름 D = m × Z = 4 × 48 = 192mm입니다." },
{ part:"기계재료 및 요소", id:"2021-1회 12번", q:"전단력 1,000kgf가 작용하는 볼트를 설계 시 허용 최소 호칭지름은? (단, 미터보통나사로 허용전단응력 6kgf/mm²이다)", options:["M10","M12","M16","M20"], answer:3, explain:"응력 계산 공식에 따라 최소 지름은 약 14.5mm이며, 규격상 M16이 적합합니다." },
{ part:"기계재료 및 요소", id:"2021-1회 13번", q:"벨트가 회전하기 시작하여 동력을 전달하게 되면 긴장측의 장력은 커지고, 이완측의 장력은 작아지게 되는데, 이 차이를 무엇이라고 하는가?", options:["이완장력","허용장력","초기장력","유효장력"], answer:4, explain:"긴장측 장력과 이완측 장력의 차이를 유효장력(Effective Tension)이라고 합니다." },
{ part:"기계공작법", id:"2021-1회 15번", q:"길이가 100mm인 스프링의 한 끝을 고정하고, 다른 끝에 무게 40N의 추를 달았더니 스프링의 전체 길이가 120mm로 늘어났다. 이때의 스프링 상수(N/mm)는?", options:["0.5","1","2","4"], answer:3, explain:"스프링 상수 k = W / δ = 40 / (120-100) = 2N/mm입니다." },
{ part:"기계재료 및 요소", id:"2021-1회 24번", q:"미끄럼 베어링의 윤활방법이 아닌 것은?", options:["적하 급유법","패드 급유법","오일링 급유법","충격 급유법"], answer:4, explain:"윤활 방법에는 적하, 패드, 오일링, 강제 급유법 등이 있으며 충격 급유법은 해당하지 않습니다." },
{ part:"기계공작법", id:"2021-1회 28번", q:"공작기계의 기본운동에 해당되지 않는 것은?", options:["절삭운동","치핑운동","이송운동","위치조정운동"], answer:2, explain:"공작기계의 기본 3요소 운동은 절삭, 이송, 위치 조정 운동입니다." },
{ part:"기계공작법", id:"2021-1회 29번", q:"공작기계에서 일감을 회전운동시켜서 가공하는 것은?", options:["선반","드릴링","플레이너","밀링"], answer:1, explain:"선반은 공작물을 회전시키고 공구는 직선 운동을 하여 가공하는 대표적인 기계입니다." },
{ part:"기계재료 및 요소", id:"2021-1회 32번", q:"분할 핀에 관한 설명으로 틀린 것은?", options:["핀 전체가 두 갈래로 되어 있다.","너트의 풀림 방지에 사용된다.","핀이 빠져 나오지 않도록 하는 데 사용된다.","테이퍼 핀의 일종이다."], answer:4, explain:"분할 핀은 끝이 갈라진 형태의 핀으로, 테이퍼 핀과는 종류가 다릅니다." },
{ part:"기계공작법", id:"2021-1회 33번", q:"절삭저항의 3분력에 포함되지 않는 것은?", options:["표면분력","주분력","이송분력","배분력"], answer:1, explain:"절삭저항의 3분력은 주분력, 배분력, 이송분력으로 구성됩니다." },
{ part:"기계공작법", id:"2021-1회 39번", q:"절삭 날과 자루가 분리되고, 엔드밀의 지름이 큰 경우에 사용되는 엔드밀은?", options:["평 엔드밀","라프 엔드밀","볼 엔드밀","쉘 엔드밀"], answer:4, explain:"쉘 엔드밀은 지름이 큰 경우에 자루와 분리하여 조립해서 사용하는 방식입니다." },
{ part:"기계공작법", id:"2021-1회 40번", q:"입도가 작고 연한 숫돌에 작은 압력으로 가압하면서 가공물에 이송을 주고, 동시에 숫돌에 진동을 주어 표면거칠기를 향상시키는 가공법은?", options:["이온가공","쇼트피닝","슈퍼피니싱","배럴가공"], answer:3, explain:"슈퍼피니싱은 미세한 숫돌에 진동을 주어 가공물의 표면을 매우 정밀하고 매끄럽게 다듬는 가공법입니다." },
{ part:"기계공작법", id:"2021-1회 41번", q:"열에 민감한 가공물, 연질가공물, 두께가 얇은 판 등을 변형 없이 가공하는 데 적합한 가공법은?", options:["전주가공","전해연삭","전해연마","초음파가공"], answer:4, explain:"초음파가공은 초음파 진동을 이용하여 단단하거나 깨지기 쉬운 재료, 얇은 판 등을 정밀하게 가공하는 데 유리합니다." },
{ part:"기계공작법", id:"2021-1회 42번", q:"연삭숫돌의 결합제 중 주성분이 점토와 장석인 결합제는?", options:["비트리파이드 결합제","실리케이트 결합제","레지노이드 결합제","셀락 결합제"], answer:1, explain:"비트리파이드(V) 결합제는 점토와 장석을 주성분으로 하는 무기질 결합제입니다." },

// 7. 안전규정준수
{ part:"안전규정준수", id:"2021-1회 60번", q:"CNC 작업 중 기계에 이상이 발생하였을 때 조치사항으로 적당하지 않은 것은?", options:["알람내용을 확인한다.","경보등이 점등되었는지 확인한다.","간단한 내용은 조작설명서에 따라 조치하고 안 되면 전문가에게 의뢰한다.","기계가공이 안 되기 때문에 무조건 전원을 끈다."], answer:4, explain:"기계 이상 발생 시 무조건 전원을 끄는 것은 적절하지 않으며, 먼저 알람 내용을 확인하고 적절한 매뉴얼에 따라 조치해야 합니다." },// 1. 기계재료
{ part:"기계재료 및 요소", id:"2020-2회 01번", q:"일반적인 합성수지의 공통된 성질로 거리가 가장 먼 것은?", options:["가볍다.","착색이 자유롭다.","전기절연성이 좋다.","열에 강하다."], answer:4, explain:"합성수지는 열에 약하며 금속재료에 비해 내열성이 낮습니다." },
{ part:"기계재료 및 요소", id:"2020-2회 02번", q:"조성은 Al에 Cu와 Mg이 각각 1%, Si가 12%, Ni이 1.8%인 Al 합금으로 열팽창계수가 작아 내연기관 피스톤용으로 이용되는 것은?", options:["Y 합금","라우탈","실루민","Lo-Ex 합금"], answer:4, explain:"Lo-Ex(로우엑스) 합금은 열팽창계수가 작아 내연기관 피스톤용으로 사용되는 Al-Si계 합금입니다." },
{ part:"기계재료 및 요소", id:"2020-2회 03번", q:"한 변의 길이가 2cm인 정사각형 단면의 주철제 각봉에 4,000N의 중량을 가진 물체를 올려놓았을 때 생기는 압축응력(N/mm²)은?", options:["10","20","30","40"], answer:1, explain:"압축응력(σc) = 하중(Pc) / 단면적(A) = 4,000N / (20mm × 20mm) = 10N/mm²입니다." },
{ part:"기계재료 및 요소", id:"2020-2회 33번", q:"다음 중 경금속이라고 할 수 없는 것은?", options:["알루미늄","마그네슘","베릴륨","주석"], answer:4, explain:"비중 4.5를 기준으로 경금속과 중금속을 구분하며, 주석은 비중 5.8로 중금속에 속합니다." },

// 2. 기계제도
{ part:"기계제도", id:"2020-2회 35번", q:"물체의 일부분 생략 또는 단면의 경계를 나타내는 선으로 자를 쓰지 않고 자유롭게 긋는 선의 명칭은?", options:["파단선","지시선","가상선","절단선"], answer:1, explain:"파단선은 물체의 일부분을 파단한 경계 또는 일부를 떼어낸 경계를 나타내는 가는 실선입니다." },
{ part:"기계제도", id:"2020-2회 37번", q:"다음 끼워맞춤 치수공차 기호 중 헐거운 끼워맞춤은?", options:["∅50H7/p6","∅50H7/g6","∅50H7/js6","∅50H7/m6"], answer:2, explain:"H7/g6 조합은 구멍 기준식 헐거운 끼워맞춤에 해당합니다." },
{ part:"기계제도", id:"2020-2회 40번", q:"대칭도를 나타내는 기호는?", options:["원통도","평행도","온 흔들림","대칭도 ≡"], answer:4, explain:"기하공차 기호 중 ≡는 대칭도를 의미합니다." },

// 3. 측정
{ part:"기계공작법", id:"2020-2회 10번", q:"다음 중 광학적으로 길이의 미소범위를 확대하여 측정하는 것은?", options:["버니어 캘리퍼스","옵티미터","마이크로인디케이터","사인바"], answer:2, explain:"옵티미터(Optimeter)는 광학적 방법으로 측정물의 치수를 확대하여 기준게이지와 비교 측정하는 기구입니다." },
{ part:"기계공작법", id:"2020-2회 29번", q:"마이크로미터의 원리에 대한 설명으로 옳은 것은?", options:["어떤 길이의 변화를 나사의 회전각과 지름에 의해 확대시켜 만든 것이다.","어떤 길이의 변화를 롤러 및 게이지 블록을 이용하여 만든 것이다.","어떤 길이의 변화를 기포관 내의 기포 위치를 확대시켜 만든 것이다.","어떤 길이의 변화를 광파장에 의해 확대시켜 만든 것이다."], answer:1, explain:"마이크로미터는 나사의 피치를 이용하여 회전 운동을 직선 운동으로 바꾸고 이를 확대하여 길이를 측정합니다." },

// 4. 밀링가공
{ part:"기계공작법", id:"2020-2회 11번", q:"밀링머신의 부속장치가 아닌 것은?", options:["분할대","래크절삭장치","아버","에이프런"], answer:4, explain:"에이프런(Apron)은 선반의 왕복대를 구성하는 부속장치입니다." },
{ part:"기계공작법", id:"2020-2회 24번", q:"밀링에서 날 1개당의 이송을 fz=0.01mm, 날수 z=6, 회전수 n=500rpm일 때, 이송속도 f(mm/min)는?", options:["3,000mm/min","1,200mm/min","120mm/min","30mm/min"], answer:4, explain:"테이블 이송속도 f = fz × z × n = 0.01 × 6 × 500 = 30mm/min입니다." },
{ part:"기계공작법", id:"2020-2회 31번", q:"절삭날과 자루가 분리되고, 엔드밀의 지름이 큰 경우에 사용되는 엔드밀은?", options:["평 엔드밀","라프 엔드밀","볼 엔드밀","쉘 엔드밀"], answer:4, explain:"쉘 엔드밀(Shell Endmill)은 지름이 큰 경우에 자루와 분리하여 조립해서 사용합니다." },

// 5. CNC 밀링
{ part:"CNC 밀링", id:"2020-2회 25번", q:"CNC 선반의 보조기능(Miscellaneous Function) 중 스핀들 정지를 나타내는 것은?", options:["M02","M03","M04","M05"], answer:4, explain:"M05는 주축(스핀들) 정지 명령입니다." },
{ part:"CNC 밀링", id:"2020-2회 43번", q:"CNC 선반프로그램에서 원호 보간에 사용하는 좌표 I, K가 뜻하는 것은?", options:["원호 끝점의 위치","원호 시작점의 위치","원호의 시작점에서 끝점까지의 벡터량","원호의 시작점에서 중심점까지의 벡터량"], answer:4, explain:"I, K는 원호 보간 시 시작점에서 원호 중심까지의 거리(벡터량)를 나타냅니다." },
{ part:"CNC 밀링", id:"2020-2회 44번", q:"CNC 선반프로그램에서 G99에 설명으로 맞는 것은?", options:["G99는 분당 회전(rev/min)을 의미한다.","G99는 회전당 분(min/rev)을 의미한다.","G99는 회전당 이송거리(mm/rev)를 의미한다.","G99는 이송거리당 회전(rev/mm)을 의미한다."], answer:3, explain:"G99는 회전당 이송(mm/rev)을 지령하는 코드입니다." },
{ part:"CNC 밀링", id:"2020-2회 45번", q:"CNC 프로그램에서 G96 S200 M03; 지령에서 S200의 가장 올바른 의미는?", options:["주축 회전수 : 200rpm","절삭속도 : 200m/min","절삭속도 : 200mm/rev","주축 최고 회전수 : 200rpm"], answer:2, explain:"G96은 절삭속도 일정 제어 명령이며, S200은 절삭속도 200m/min을 의미합니다." },
{ part:"CNC 밀링", id:"2020-2회 46번", q:"CNC 프로그램에서 G96 S200 M03; 지령에서 S200이 뜻하는 것은?", options:["1분당 공구의 이송량이 200mm로 일정제어된다.","1회전당 공구의 이송량이 200mm로 일정제어된다.","주축의 원주속도가 200m/min으로 일정하게 제어된다.","주축 회전수가 200rpm으로 일정제어된다."], answer:3, explain:"G96 S200은 주축의 원주속도(절삭속도)를 200m/min으로 일정하게 유지하도록 제어합니다." },
{ part:"CNC 밀링", id:"2020-2회 48번", q:"다음 중 지정된 블록에서만 유효한 G코드(One Shot G Code)가 아닌 것은?", options:["G04","G30","G40","G50"], answer:3, explain:"G40은 공구 인선 반경 보정 취소로, 그룹 내 다른 G코드가 나올 때까지 유효한 모달(Modal) G코드입니다." },
{ part:"CNC 밀링", id:"2020-2회 49번", q:"CNC 프로그램에서 공구 길이 보정과 관계없는 준비기능은?", options:["G42","G43","G44","G49"], answer:1, explain:"G42는 공구 인선 반경 보정(우측) 명령입니다. 길이 보정은 G43, G44, G49를 사용합니다." },
{ part:"CNC 밀링", id:"2020-2회 50번", q:"다음 중 CAD/CAM 시스템의 출력장치에 해당하는 것은?", options:["모니터","키보드","마우스","스캐너"], answer:1, explain:"모니터, 프린터, 플로터 등은 출력장치이며 나머지는 입력장치입니다." },
{ part:"CNC 밀링", id:"2020-2회 51번", q:"다음 중 CNC 선반에서 나사가공에 사용된 고정 사이클은?", options:["G28","G50","G92","G97"], answer:3, explain:"G92는 CNC 선반의 나사 절삭 사이클입니다." },
{ part:"CNC 밀링", id:"2020-2회 53번", q:"CNC 공작기계에서 일반적인 명령절의 구성 순서를 나타낸 것이다. M 기능에 해당되는 것은?", options:["준비기능","보조기능","이송기능","주축기능"], answer:2, explain:"M(Miscellaneous Function) 기능은 기계의 각종 보조장치 제어를 위한 보조기능입니다." },
{ part:"CNC 밀링", id:"2020-2회 57번", q:"CNC 프로그램은 여러 개의 지령절(Block)이 모여 구성된다. 지령절과 지령절의 구분은 무엇으로 표시하는가?", options:["블록(Block)","워드(Word)","어드레스(Address)","EOB(End Of Block)"], answer:4, explain:"EOB(End Of Block) 기호는 한 개의 지령 단위(블록)의 종료를 나타냅니다." },
{ part:"CNC 밀링", id:"2020-2회 59번", q:"1대의 컴퓨터에 여러 대의 CNC 공작기계를 연결하고 가공 데이터를 분배 전송하여 동시에 운전하는 방식은?", options:["FMS","FMC","DNC","CIMS"], answer:3, explain:"DNC(Distributed Numerical Control)는 중앙 컴퓨터가 여러 대의 기계를 통합 제어하는 방식입니다." },
{ part:"CNC 밀링", id:"2020-2회 60번", q:"범용 공작기계와 CNC 공작기계를 비교하였을 때, CNC 공작기계가 유리한 점이 아닌 것은?", options:["복잡한 형상의 부품가공에 성능을 발휘한다.","품질이 균일화되어 제품의 호환성을 유지할 수 있다.","장시간 자동운전이 가능하다.","숙련에 오랜 시간과 경험이 필요하다."], answer:4, explain:"CNC 공작기계는 범용 기계에 비해 숙련에 필요한 시간과 경험을 대폭 줄일 수 있습니다." },

// 6. 기타 기계가공
{ part:"기계공작법", id:"2020-2회 04번", q:"공작기계의 기본운동에 해당되지 않는 것은?", options:["절삭운동","치핑운동","이송운동","위치조정운동"], answer:2, explain:"공작기계의 기본 3요소 운동은 절삭, 이송, 위치 조정 운동입니다." },
{ part:"기계공작법", id:"2020-2회 05번", q:"지름이 120mm, 길이 340mm인 중탄소강 둥근 막대를 초경합금 바이트를 사용하여 절삭속도 150m/min으로 절삭하고자 할 때, 그 회전수는?", options:["398rpm","410rpm","430rpm","458rpm"], answer:1, explain:"회전수 n = (1,000 × 150) / (π × 120) ≈ 398rpm입니다." },
{ part:"기계공작법", id:"2020-2회 06번", q:"선반에서 사용되는 맨드릴의 종류가 아닌 것은?", options:["팽창식 맨드릴","조립식 맨드릴","방진구식 맨드릴","표준 맨드릴"], answer:3, explain:"맨드릴 종류에는 표준, 테이퍼, 팽창식, 조립식 등이 있으며 방진구식은 해당하지 않습니다." },
{ part:"기계공작법", id:"2020-2회 07번", q:"연삭숫돌의 입도를 선택하는 조건 중 틀린 것은?", options:["거칠게 연삭할 때는 거친 입도","접촉면이 클 때는 거친 입도","경도가 높은 일감에는 거친 입도","연성재료에는 거친 입도"], answer:3, explain:"경도가 높고 정밀한 가공이 필요한 경우에는 고운 입도를 선택해야 합니다." },
{ part:"기계공작법", id:"2020-2회 08번", q:"브로칭 머신으로 가공할 수 없는 것은?", options:["스플라인 홈","다각형의 구멍","등근 구멍 안의 키 홈","베어링용 볼"], answer:4, explain:"베어링용 볼은 브로칭 머신으로 가공할 수 없습니다." },
{ part:"기계공작법", id:"2020-2회 09번", q:"일반적으로 바이스의 크기를 나타내는 것은?", options:["바이스 전체의 중량","물건을 물릴 수 있는 조의 폭","물건을 물릴 수 있는 최대의 거리","바이스의 최대 높이"], answer:2, explain:"바이스의 크기는 공작물을 물리는 조(Jaw)의 폭으로 표시합니다." },
{ part:"기계공작법", id:"2020-2회 12번", q:"수기가공 시 금긋기용 공구에 해당되지 않는 것은?", options:["V-블록","서피스 게이지","직각자","스크레이퍼"], answer:4, explain:"스크레이퍼(Scraper)는 금속 표면을 깎아 정밀하게 다듬는 가공용 공구입니다." },
{ part:"기계공작법", id:"2020-2회 14번", q:"드릴(Drill)에 대한 설명이 맞는 것은?", options:["웨브(Web)는 드릴 끝쪽으로 갈수록 두꺼워진다.","드릴의 외경은 자루쪽으로 갈수록 커진다.","표준 드릴의 날끝각은 100°, 여유각은 8°이다.","Ø13mm 이상의 드릴은 슬리브(Sleeve)나 소켓(Socket)에 끼워 사용한다."], answer:4, explain:"드릴 지름이 13mm 이상이면 자루가 테이퍼져 있어 슬리브나 소켓이 필요합니다." },
{ part:"기계공작법", id:"2020-2회 15번", q:"선반에서 사용되는 척으로, 조가 동시에 움직이므로 원형, 정다각형의 일감을 고정하는 데 편리한 척은?", options:["연동척","단동척","마그네틱척","콜릿척"], answer:1, explain:"연동척(3조 척)은 조 3개가 동시에 움직여 일감을 자동으로 중심에 고정합니다." },
{ part:"기계공작법", id:"2020-2회 16번", q:"바이트에서 칩브레이커를 붙이는 이유는?", options:["선반에서 바이트의 강도를 높이기 위하여","절삭속도를 빠르게 하기 위하여","바이트와 공작물의 마찰을 작게 하기 위하여","칩을 짧게 끊기 위하여"], answer:4, explain:"칩브레이커는 길고 유동적인 칩을 짧게 끊어주는 역할을 합니다." },
{ part:"기계공작법", id:"2020-2회 18번", q:"드릴의 소재로 사용되지 않는 것은?", options:["탄소공구강","합금공구강","고속도강","세라믹"], answer:4, explain:"드릴 소재로는 고속도강 등이 쓰이며 세라믹은 충격에 약해 부적합합니다." },
{ part:"기계공작법", id:"2020-2회 20번", q:"선반에서 끝면 가공에 쓰이는 센터는?", options:["회전센터","하프센터","베어링센터","45° 센터"], answer:2, explain:"하프센터는 단면 가공 시 공구의 간섭을 피하도록 설계된 센터입니다." },
{ part:"기계공작법", id:"2020-2회 22번", q:"선반가공에서 바이트의 설치와 관련된 설명으로 틀린 것은?", options:["바이트 날 끝의 높이는 공작물의 중심과 일치시켜 고정한다.","바이트의 돌출 길이는 가능하면 짧게 설치한다.","돌출 길이는 자루 높이의 2배 이내(고속도강 기준)로 설치한다.","바이트의 설치는 공작물의 중심축과 90°보다 크게 한다."], answer:4, explain:"바이트는 공작물의 중심축과 정확히 90°가 되도록 설치해야 합니다." },
{ part:"기계공작법", id:"2020-2회 23번", q:"공작기계에서 일감을 회전운동시켜서 가공하는 것은?", options:["선반","드릴링","플레이너","밀링"], answer:1, explain:"선반은 공작물을 회전시켜 원통형 형상을 가공하는 대표적인 기계입니다." },
{ part:"기계공작법", id:"2020-2회 26번", q:"여러 종류의 기계 기능을 조합하여 다양한 가공이 가능하도록 만든 공작기계는?", options:["범용 공작기계","단능 공작기계","전용 공작기계","만능 공작기계"], answer:4, explain:"만능 공작기계는 여러 기능을 하나로 조합하여 보수나 다양한 가공에 유리합니다." },
{ part:"기계공작법", id:"2020-2회 27번", q:"선반가공에서 대형 일감을 지지할 때 사용되는 심압대측 센터 끝의 각도는?", options:["60°","65°","70°","90°"], answer:4, explain:"대형 또는 무거운 공작물 지지 시에는 하중에 견디기 위해 센터 각도를 90°로 합니다." },
{ part:"기계공작법", id:"2020-2회 28번", q:"큰 일감을 고정시키고 주축의 드릴 부분을 움직여서 구멍을 뚫는 드릴머신의 종류는?", options:["직립 드릴링 머신","탁상 드릴링 머신","다축 드릴링 머신","레이디얼 드릴링 머신"], answer:4, explain:"레이디얼 드릴링 머신은 드릴 헤드가 암을 따라 이동할 수 있어 대형물 가공에 유리합니다." },
{ part:"기계공작법", id:"2020-2회 30번", q:"래핑작업에 대한 설명으로 틀린 것은?", options:["가공면이 매끈한 거울면을 얻을 수 있다.","정밀도가 높은 제품을 가공할 수 있다.","가공면은 윤활성 및 내마모성이 좋다.","작업이 깨끗하고 먼지가 적다."], answer:4, explain:"래핑은 랩제를 사용하므로 작업장이 지저분해지고 먼지가 발생합니다." },
{ part:"기계공작법", id:"2020-2회 32번", q:"절삭저항의 3분력에 포함되지 않는 것은?", options:["표면분력","주분력","이송분력","배분력"], answer:1, explain:"절삭저항의 3분력은 주분력, 배분력, 이송분력입니다." },
{ part:"기계공작법", id:"2020-2회 34번", q:"무거운 기계 등을 달아 올릴 때 로프 등을 거는 데 적합한 머리에 고리가 달린 볼트는?", options:["스테이 볼트","전단 볼트","아이볼트","T 볼트"], answer:3, explain:"아이볼트(Eye Bolt)는 고리가 있어 중량물을 들어 올리는 용도로 쓰입니다." },
{ part:"기계공작법", id:"2020-2회 42번", q:"입도가 작고 연한 숫돌에 진동을 주어 표면거칠기를 향상시키는 가공법은?", options:["이온가공","쇼트피닝","슈퍼피니싱","배럴가공"], answer:3, explain:"슈퍼피니싱은 미세한 숫돌 진동을 이용해 표면을 정밀하게 다듬는 공법입니다." },

// 7. 안전규정준수
{ part:"안전규정준수", id:"2020-2회 54번", q:"밀링작업 시 안전 및 유의사항이 잘못된 것은?", options:["기계 가동 전 작동 상태 점검","기름의 양 확인 및 보충","주축 완전 정지 후 속도 변환","칩은 손으로 털어서 제거"], answer:4, explain:"칩 제거 시에는 반드시 기계를 정지시키고 전용 도구(브러시 등)를 사용해야 합니다." },// --- 2020년 1회 추가 문항 (7개 파트 분류 적용) ---
    { part:"기계재료 및 요소", id:"20-1-01", q:"일반적으로 경금속과 중금속을 구분하는 비중의 경계는?", options:["1.6", "2.6", "3.6", "4.6"], answer:4, explain:"비중 4.5(또는 4.6)를 기준으로 그보다 작으면 경금속, 크면 중금속으로 분류합니다."},
    { part:"기계재료 및 요소", id:"20-1-02", q:"탄소강에 함유된 원소 중 백점이나 헤어크랙의 원인이 되는 원소는?", options:["황(S)", "인(P)", "수소(H)", "구리(Cu)"], answer:3, explain:"헤어크랙 또는 백점은 강재의 다듬질면에 발생하는 미세한 균열로, 수소(H)에 의해 발생합니다."},
    { part:"기계재료 및 요소", id:"20-1-03", q:"비중이 2.7로서 가볍고 은백색의 금속으로 내식성이 좋으며, 전기전도율이 구리의 60% 이상인 금속은?", options:["알루미늄(Al)", "마그네슘(Mg)", "바나듐(V)", "안티몬(Sb)"], answer:1, explain:"알루미늄(Al)은 비중 2.7의 가벼운 금속으로, 전기 전도율은 구리의 60% 이상이며 내식성이 강합니다."},
    { part:"기계재료 및 요소", id:"20-1-04", q:"황동은 어떤 원소의 2원 합금인가?", options:["구리와 주석", "구리와 망간", "구리와 납", "구리와 아연"], answer:4, explain:"황동은 구리+아연(Cu+Zn) 합금이며, 청동은 구리+주석(Cu+Sn) 합금입니다."},
